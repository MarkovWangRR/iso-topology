# Azure Databricks — classic Lakehouse analytics architecture.
# Style base: royal-circuit-flat (royal blue / flat / crisp light-blue edges).
# Hero = the Delta Lake medallion (bronze/silver/gold); Databricks engine drives it.
canvas: { background: "#1C2F8E", grid: "", padding: 72 }

theme:
  text: { family: "Segoe UI, Inter, system-ui, sans-serif", size: 10, weight: "600", color: "#C7D3F5" }
  presets:
    # ---- periwinkle service block — light top -> dark ink ----
    azure:
      palette: { top: "#7FA0E8", left: "#3A55B0", right: "#2F4794" }
      stroke: { color: "#6F92E8", width: 1.4 }
      text: { color: "#14204A" }
    # ---- mid-royal block — compute / sources ----
    azureDeep:
      palette: { top: "#5D7FD6", left: "#2F4794", right: "#243A7E" }
      stroke: { color: "#7FA0E8", width: 1.4 }
      text: { color: "#0E1A40" }
    # ---- Databricks engine accent (the lakehouse brand: warm red) ----
    brick:
      palette: { top: "#FF7A5C", left: "#B03A22", right: "#D9512F" }
      stroke: { color: "#FF9E86", width: 1.4 }
      text: { color: "#3A1006" }
    # ---- Medallion accents (warm, light tops -> dark ink) ----
    bronze:
      palette: { top: "#E3A75C", left: "#8A551F", right: "#B97E36" }
      stroke: { color: "#F0C588", width: 1.4 }
      text: { color: "#3A2410" }
    silver:
      palette: { top: "#E6E9EE", left: "#9AA3B0", right: "#C2C9D2" }
      stroke: { color: "#FFFFFF", width: 1.4 }
      text: { color: "#2A3240" }
    gold:
      palette: { top: "#FCD679", left: "#C7951F", right: "#E5B53A" }
      stroke: { color: "#FFE9A6", width: 1.4 }
      text: { color: "#4A3508" }
    # ---- dark royal group tray (dots) ----
    tray:
      palette: { top: "#20307A" }
      stroke: { color: "#3D52A8", width: 1.1 }
      text: { color: "#C3D0F2" }
      effects: { cornerRadius: 4, pattern: { kind: dots, color: "#3A4FA0", spacing: 9 } }
    # ---- elevated royal hero tray (lakehouse) ----
    trayHero:
      palette: { top: "#34489E" }
      stroke: { color: "#6F92E8", width: 1.5 }
      text: { color: "#FFFFFF" }
      effects: { cornerRadius: 6, pattern: { kind: dots, color: "#4A60B4", spacing: 9 }, dropShadow: { dx: 5, dy: 10, blur: 16, color: "#00000066" }, backglow: { color: "#7FA0E8", radius: 40, opacity: 0.35 } }

nodes:
  scene:
    shape: composite
    parts:
      # ============ Title ============
      - id: title
        offset: { wx: -560, wy: -150 }
        shape: iso_text
        geom: { w: 560, d: 26, h: 4 }
        label: "Azure Databricks — Lakehouse Analytics Architecture"
        style:
          palette: { top: "#1C2F8E" }
          text: { orient: screen, size: 19, weight: "700", color: "#EAF1FF" }

      # ============ HERO: the Lakehouse (ADLS Gen2 + Delta Lake medallion) ============
      - id: lake
        preset: trayHero
        shape: group
        label: "Lakehouse · ADLS Gen2 + Delta Lake"
        layout: { mode: column, gap: 0.7 }
        parts:
          - { id: bronze, preset: bronze, shape: rectangle, geom: { w: 170, d: 78, h: 26 }, icon: "iso://glyph/database", label: "Bronze · Raw" }
          - { id: silver, preset: silver, shape: rectangle, geom: { w: 170, d: 78, h: 26 }, icon: "iso://glyph/table",    label: "Silver · Cleansed" }
          - { id: gold,   preset: gold,   shape: rectangle, geom: { w: 170, d: 78, h: 26 }, icon: "iso://glyph/sparkles", label: "Gold · Curated" }

      # ============ Ingestion (left of hero) ============
      - id: ingest
        place: { leftOf: lake, gap: 2.6 }
        preset: tray
        shape: group
        label: "Ingestion"
        layout: { mode: column, gap: 0.9 }
        parts:
          - { id: adf, preset: azure, shape: rectangle, geom: { w: 140, d: 74, h: 24 }, icon: "iso://glyph/etl",   label: "Data Factory · Batch" }
          - { id: evh, preset: azure, shape: rectangle, geom: { w: 140, d: 74, h: 24 }, icon: "iso://glyph/queue", label: "Event Hubs · Auto Loader" }

      # ============ Sources (far left) ============
      - id: sources
        place: { leftOf: ingest, gap: 2.6 }
        preset: tray
        shape: group
        label: "Data Sources"
        layout: { mode: column, gap: 0.9 }
        parts:
          - { id: srcdb,   preset: azureDeep, shape: cylinder,  geom: { w: 92, d: 92, h: 38 }, icon: "iso://glyph/database/light", label: "SQL · Cosmos DB" }
          - { id: srcsaas, preset: azureDeep, shape: cloud,     geom: { w: 92, d: 78, h: 40 }, icon: "iso://glyph/cloud/light",    label: "SaaS & Apps" }
          - { id: srciot,  preset: azureDeep, shape: rectangle, geom: { w: 130, d: 70, h: 24 }, icon: "iso://glyph/stream/light",  label: "IoT · Logs" }

      # ============ Databricks engine / processing (in front of hero) ============
      - id: engine
        place: { inFrontOf: lake, gap: 2.4 }
        preset: tray
        shape: group
        label: "Azure Databricks · Compute"
        layout: { mode: row, gap: 0.9 }
        parts:
          - { id: dlt,    preset: brick, shape: rectangle, geom: { w: 132, d: 86, h: 30 }, icon: "iso://si/databricks/light",   label: "Delta Live Tables" }
          - { id: jobs,   preset: brick, shape: rectangle, geom: { w: 132, d: 86, h: 30 }, icon: "iso://glyph/gauge/light",     label: "Workflows · Jobs" }
          - { id: photon, preset: brick, shape: rectangle, geom: { w: 132, d: 86, h: 30 }, icon: "iso://si/apachespark/light",  label: "Photon · Spark" }

      # ============ Consumption / serving (right of hero) ============
      - id: consume
        place: { rightOf: lake, gap: 2.6 }
        preset: tray
        shape: group
        label: "Analytics & Consumption"
        layout: { mode: column, gap: 0.9 }
        parts:
          - { id: dbsql, preset: azure, shape: rectangle, geom: { w: 138, d: 72, h: 24 }, icon: "iso://glyph/warehouse", label: "Databricks SQL" }
          - { id: pbi,   preset: azure, shape: rectangle, geom: { w: 138, d: 72, h: 24 }, icon: "iso://glyph/chart",     label: "Power BI" }
          - { id: ml,    preset: azure, shape: rectangle, geom: { w: 138, d: 72, h: 24 }, icon: "iso://glyph/model",     label: "ML · MLflow" }

      # ============ Unity Catalog — governance (cross-cutting layer below the platform) ============
      - id: unity
        place: { inFrontOf: engine, gap: 2.2 }
        preset: tray
        shape: group
        label: "Unity Catalog · Governance"
        layout: { mode: row, gap: 0.9 }
        parts:
          - { id: ucgov,  preset: azure, shape: rectangle, geom: { w: 126, d: 64, h: 22 }, icon: "iso://glyph/shield", label: "Lineage · Access" }
          - { id: ucauth, preset: azure, shape: rectangle, geom: { w: 126, d: 64, h: 22 }, icon: "iso://glyph/lock",   label: "Entra ID" }

    connectors:
      # main left -> right flow, module -> module — crisp light-blue edges
      - { from: sources, to: ingest,  routing: orthogonal, arrow: triangle, stroke: { color: "#8AAAF0", width: 1.4 } }
      - { from: ingest,  to: lake,    routing: orthogonal, arrow: triangle, stroke: { color: "#8AAAF0", width: 1.4 } }
      - { from: lake,    to: engine,  routing: orthogonal, arrow: triangle, stroke: { color: "#FF9E86", width: 1.5 } }
      - { from: engine,  to: lake,    routing: orthogonal, arrow: triangle, stroke: { color: "#FF9E86", width: 1.5 } }
      - { from: lake,    to: consume, routing: orthogonal, arrow: triangle, stroke: { color: "#8AAAF0", width: 1.4 } }
      # Unity Catalog governs the lakehouse (dashed control plane)
      - { from: unity,   to: lake,    routing: orthogonal, arrow: none, stroke: { color: "#A9B8E6", width: 1.1, dash: "4 4" } }
