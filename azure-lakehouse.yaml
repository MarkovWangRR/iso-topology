# Style base: samples/style_refer/royal-circuit-flat (royal blue / flat / two-tone,
# crisp light-blue edges, no gradients, sharp corners). Topology + hand-tuned
# layout preserved; medallion kept as the warm hero accent.
canvas: { background: "#1C2F8E", grid: "", padding: 72 }

theme:
  text: { family: "Segoe UI, Inter, system-ui, sans-serif", size: 10, weight: "600", color: "#C7D3F5" }
  presets:
    # ---- periwinkle service block (royal-circuit-flat cubeA) — light top -> dark ink ----
    azure:
      palette: { top: "#7FA0E8", left: "#3A55B0", right: "#2F4794" }
      stroke: { color: "#6F92E8", width: 1.4 }
      text: { color: "#14204A" }
    # ---- mid-royal block (royal-circuit-flat cubeC) — rhythm / sources / compute ----
    azureDeep:
      palette: { top: "#5D7FD6", left: "#2F4794", right: "#243A7E" }
      stroke: { color: "#7FA0E8", width: 1.4 }
      text: { color: "#0E1A40" }
    # ---- Medallion accents (warm, light tops -> dark ink) ----
    bronze:
      palette: { top: "#E3A75C", left: "#8A551F", right: "#B97E36" }
      stroke: { color: "#F0C588", width: 1.4 }
      text: { color: "#3A2410" }
    silver:
      palette: { top: "#E6E9EE", left: "#9AA3B0", right: "#C2C9D2" }
      stroke: { color: "#FFFFFF", width: 1.4 }
      text: { color: "#2A3240" }
    gold:
      palette: { top: "#FCD679", left: "#C7951F", right: "#E5B53A" }
      stroke: { color: "#FFE9A6", width: 1.4 }
      text: { color: "#4A3508" }
    # ---- dark royal group tray (dots) ----
    tray:
      palette: { top: "#20307A" }
      stroke: { color: "#3D52A8", width: 1.1 }
      text: { color: "#C3D0F2" }
      effects: { cornerRadius: 4, pattern: { kind: dots, color: "#3A4FA0", spacing: 9 } }
    # ---- elevated royal hero tray (lakehouse) ----
    trayHero:
      palette: { top: "#34489E" }
      stroke: { color: "#6F92E8", width: 1.5 }
      text: { color: "#FFFFFF" }
      effects: { cornerRadius: 6, pattern: { kind: dots, color: "#4A60B4", spacing: 9 }, dropShadow: { dx: 5, dy: 10, blur: 16, color: "#00000066" } }

nodes:
  scene:
    shape: composite
    parts:
      # ============ Title ============
      - id: title
        offset: { wx: -740, wy: -112 }
        shape: iso_text
        geom: { w: 520, d: 26, h: 4 }
        label: "Azure Lakehouse — Medallion Data Architecture"
        style:
          palette: { top: "#1C2F8E" }
          text: { orient: screen, size: 19, weight: "700", color: "#EAF1FF" }

      # ============ HERO: Lakehouse storage (ADLS Gen2 + Delta medallion) ============
      - id: lake
        geom: { d: 380 }
        offset: { wx: 6, wy: -53 }
        preset: trayHero
        shape: group
        label: "Data Lake Storage Gen2 · Delta Lake"
        layout: { mode: column, gap: 0.7 }
        parts:
          - { id: bronze, preset: bronze, shape: rectangle, geom: { w: 168, d: 76, h: 26 }, icon: "iso://glyph/database", label: "Bronze · Raw" }
          - { id: silver, preset: silver, shape: rectangle, geom: { w: 168, d: 76, h: 26 }, icon: "iso://glyph/table",    label: "Silver · Cleansed" }
          - { id: gold,   preset: gold,   shape: rectangle, geom: { w: 168, d: 76, h: 26 }, icon: "iso://glyph/sparkles", label: "Gold · Curated" }

      # ============ Ingestion (left of hero) ============
      - id: ingest
        geom: { d: 270 }
        offset: { wx: -296, wy: 1 }
        preset: tray
        shape: group
        label: "Ingestion"
        layout: { mode: column, gap: 0.8 }
        parts:
          - { id: adf, preset: azure, shape: rectangle, geom: { w: 138, d: 74, h: 24 }, icon: "iso://glyph/etl",   label: "Data Factory · Batch" }
          - { id: evh, preset: azure, shape: rectangle, geom: { w: 138, d: 74, h: 24 }, icon: "iso://glyph/queue", label: "Event Hubs · Stream" }

      # ============ Sources (far left) ============
      - id: sources
        offset: { wx: -566, wy: -58 }
        geom: { d: 400 }
        preset: tray
        shape: group
        label: "Data Sources"
        parts:
          - { offset: { wx: 46, wy: 32 }, id: srcdb,   preset: azureDeep, shape: cylinder,  geom: { w: 96, d: 96, h: 40 }, icon: "iso://glyph/database/light", label: "SQL · Cosmos DB" }
          - { offset: { wx: 15, wy: 153 }, id: srcsaas, preset: azureDeep, shape: cloud, geom: { w: 60, d: 84, h: 44 }, icon: "iso://glyph/cloud/light", label: "SaaS & Apps" }
          - { offset: { wx: 32, wy: 276 }, id: srciot,  preset: azureDeep, shape: rectangle, geom: { w: 124, d: 70, h: 24 }, icon: "iso://glyph/stream/light",   label: "IoT · Logs" }

      # ============ Compute / Processing (below hero) ============
      - id: compute
        offset: { wx: 10, wy: 438 }
        preset: tray
        shape: group
        label: "Compute"
        layout: { mode: row, gap: 0.8 }
        parts:
          - { id: dbx, preset: azureDeep, shape: rectangle, geom: { w: 156, d: 96, h: 30 }, icon: "iso://si/databricks/light", label: "Azure Databricks · Spark" }

      # ============ Serving (below ingestion) ============
      - id: serving
        offset: { wx: -288, wy: 444 }
        preset: tray
        shape: group
        label: "Serving"
        layout: { mode: column, gap: 0.8 }
        parts:
          - { id: synapse, preset: azure, shape: rectangle, geom: { w: 138, d: 80, h: 26 }, icon: "iso://glyph/warehouse", label: "Synapse Analytics" }

      # ============ Consumption (below sources) ============
      - id: consume
        offset: { wx: -564, wy: 391 }
        geom: { d: 250 }
        preset: tray
        shape: group
        label: "Consumption"
        layout: { mode: column, gap: 0.8 }
        parts:
          - { id: pbi, preset: azure, shape: rectangle, geom: { w: 124, d: 70, h: 24 }, icon: "iso://glyph/chart", label: "Power BI" }
          - { id: aml, preset: azure, shape: rectangle, geom: { w: 124, d: 70, h: 24 }, icon: "iso://glyph/model", label: "Azure ML" }

      # ============ Governance (center-bottom, cross-cutting) ============
      - id: govern
        geom: { d: 140 }
        offset: { wx: 317, wy: 65 }
        preset: tray
        shape: group
        label: "Governance & Security"
        layout: { mode: row, gap: 0.8 }
        parts:
          - { id: purview, preset: azure, shape: rectangle, geom: { w: 120, d: 64, h: 22 }, icon: "iso://glyph/shield", label: "Purview" }
          - { id: entra,   preset: azure, shape: rectangle, geom: { w: 120, d: 64, h: 22 }, icon: "iso://glyph/lock",   label: "Entra ID" }

    connectors:
      # main U-flow, module -> module — crisp light-blue edges
      - { from: sources, to: ingest,  routing: orthogonal, arrow: triangle, stroke: { color: "#8AAAF0", width: 1.4 } }
      - { from: ingest,  to: lake,    routing: orthogonal, arrow: triangle, stroke: { color: "#8AAAF0", width: 1.4 } }
      - { from: lake,    to: compute, routing: orthogonal, arrow: triangle, stroke: { color: "#8AAAF0", width: 1.4 } }
      - { from: compute, to: serving, routing: orthogonal, arrow: triangle, stroke: { color: "#8AAAF0", width: 1.4 } }
      - { from: serving, to: consume, routing: orthogonal, arrow: triangle, stroke: { color: "#8AAAF0", width: 1.4 } }
      # governance oversees the lake (dashed, control plane)
      - { from: govern,  to: lake,    routing: orthogonal, arrow: none, stroke: { color: "#A9B8E6", width: 1.1, dash: "4 4" } }
