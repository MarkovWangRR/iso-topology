# composite — a stat card built from three primitives sharing one bbox.
canvas:
  background: "#FAFBFC"

nodes:
  scene:
    shape: composite
    parts:
      - id: icon
        shape: rectangle
        geom: { w: 70, d: 70, h: 20 }
        offset: { wx: 0, wy: 0 }
        label: "VITE"
        style:
          palette: { top: "#7C3AED", left: "#4C1D95", right: "#6D28D9" }
          text: { color: "#FFFFFF" }
      - id: value
        shape: iso_text
        geom: { w: 140, d: 50, h: 4 }
        offset: { wx: 100, wy: 0 }
        label: "121m+"
      - id: caption
        shape: iso_text
        geom: { w: 140, d: 40, h: 4 }
        offset: { wx: 100, wy: 50 }
        label: "weekly npm"
