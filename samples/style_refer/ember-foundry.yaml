# ember-foundry — molten ember-red gradient cubes on warm paper, crisp paper
# shadows and a faint film grain; "Biomass" voxel warmth. (from red-gradient)
canvas: { background: "#F1EEE7", grid: "", padding: 56, aspectRatio: 1.4 }
theme:
  presets:
    # bright orange-red top crushing to deep maroon sides
    cubeA:
      palette:
        topGradient:   { from: "#F4853F", to: "#E45222", dir: down }
        leftGradient:  { from: "#C03F13", to: "#8E280A", dir: down }
        rightGradient: { from: "#9C310C", to: "#5A1003", dir: down }
      stroke: { color: "#8a1c08", width: 0.5 }
      effects:
        grain: { intensity: 0.07, scale: 1.3 }
        dropShadow: { dx: 0, dy: 6, blur: 8, color: "#5a1c0840" }
    # deeper ember
    cubeB:
      palette:
        topGradient:   { from: "#E45222", to: "#C03F13", dir: down }
        leftGradient:  { from: "#A92C0C", to: "#651705", dir: down }
        rightGradient: { from: "#8E280A", to: "#4A0500", dir: down }
      stroke: { color: "#7a1606", width: 0.5 }
      effects:
        grain: { intensity: 0.07, scale: 1.3 }
        dropShadow: { dx: 0, dy: 6, blur: 8, color: "#5a1c0847" }
    # pale peach accent
    cubeC:
      palette:
        topGradient:   { from: "#FBB07C", to: "#F4853F", dir: down }
        leftGradient:  { from: "#EE8A50", to: "#CF6630", dir: down }
        rightGradient: { from: "#D45D21", to: "#AC3E10", dir: down }
      stroke: { color: "#c97a44", width: 0.5 }
      effects:
        grain: { intensity: 0.06, scale: 1.3 }
        dropShadow: { dx: 0, dy: 5, blur: 7, color: "#5a1c0833" }
  shapes: { rectangle: { } }
nodes:
  scene:
    shape: composite
    layout: { mode: grid, cols: 4, gap: 0.6, padding: 1 }
    parts:
      - { id: b0,  shape: rectangle, preset: cubeA, geom: { w: 72, d: 72, h: 34 } }
      - { id: b1,  shape: rectangle, preset: cubeB, geom: { w: 72, d: 72, h: 88 } }
      - { id: b2,  shape: rectangle, preset: cubeC, geom: { w: 72, d: 72, h: 24 } }
      - { id: b3,  shape: rectangle, preset: cubeA, geom: { w: 72, d: 72, h: 60 } }
      - { id: b4,  shape: rectangle, preset: cubeB, geom: { w: 72, d: 72, h: 42 } }
      - { id: b5,  shape: rectangle, preset: cubeC, geom: { w: 72, d: 72, h: 16 } }
      - { id: b6,  shape: rectangle, preset: cubeA, geom: { w: 72, d: 72, h: 96 } }
      - { id: b7,  shape: rectangle, preset: cubeB, geom: { w: 72, d: 72, h: 50 } }
      - { id: b8,  shape: rectangle, preset: cubeC, geom: { w: 72, d: 72, h: 28 } }
      - { id: b9,  shape: rectangle, preset: cubeA, geom: { w: 72, d: 72, h: 72 } }
      - { id: b10, shape: rectangle, preset: cubeB, geom: { w: 72, d: 72, h: 38 } }
      - { id: b11, shape: rectangle, preset: cubeC, geom: { w: 72, d: 72, h: 20 } }
