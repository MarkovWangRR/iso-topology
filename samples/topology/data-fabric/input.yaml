# data-fabric — connector-driven AUTO layout (v4.2).
# Three domain lanes (commerce / logistics / telemetry) publish into a
# central Data Catalog hero, which serves Analytics and pages an Alert
# Sink. No place/coords — the engine arranges purely from the connector
# graph. Showcases style.faces (radial + linear gradients, layered
# strokes), cylinder side gradients, and the prism family.

canvas:
  background: "#FAF9F6"
  grid: iso
  gridColor: "#EDEBE3"
  gridStep: 40
  padding: 60

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 11
    weight: "600"
    color: "#52525B"
  stroke:
    color: "#D8D5CD"
    width: 1

nodes:
  scene:
    shape: composite
    layout: { mode: auto }
    parts:
      # ── Three domain lanes ───────────────────────────────────────
      - id: dom_commerce
        shape: group
        label: "Commerce"
        geom: { h: 8 }
        layout: { mode: row, gap: 0.7, padding: 0.8 }
        style:
          palette: { top: "#E5F4F0", left: "#CDE6E0", right: "#D9EDE8" }
          stroke:  { color: "#BBDCD4", width: 1 }
          text:    { color: "#356F64", size: 11 }
          effects: { cornerRadius: 12 }
        parts:
          - id: commerce_svc
            shape: rectangle
            geom: { w: 80, d: 80, h: 14 }
            icon: "iso://glyph/code/2E8C7E"
            label: "Orders"
            style:
              palette: { top: "#FFFFFF", left: "#CDE6E0", right: "#E1F0EC" }
              stroke:  { color: "#9CCFC4", width: 1 }
              effects: { cornerRadius: 9 }
          - id: commerce_db
            shape: cylinder
            geom: { w: 72, d: 72, h: 40 }
            label: "Sales"
            style:
              palette:
                top: "#EFFAF7"
                leftGradient:  { from: "#79C9BA", to: "#479E8E", dir: "down" }
                rightGradient: { from: "#9BDACE", to: "#5FB3A3", dir: "down" }
              stroke: { color: "#3D8A7C", width: 1 }
              text:   { color: "#2E6E62", size: 10, weight: "700" }

      - id: dom_logistics
        shape: group
        label: "Logistics"
        geom: { h: 8 }
        layout: { mode: row, gap: 0.7, padding: 0.8 }
        style:
          palette: { top: "#FAF1E0", left: "#EEDFC4", right: "#F4E8D2" }
          stroke:  { color: "#E4D2B0", width: 1 }
          text:    { color: "#8A6320", size: 11 }
          effects: { cornerRadius: 12 }
        parts:
          - id: logistics_svc
            shape: rectangle
            geom: { w: 80, d: 80, h: 14 }
            icon: "iso://glyph/globe/B07A2E"
            label: "Fleet"
            style:
              palette: { top: "#FFFFFF", left: "#EEDFC4", right: "#F6ECD8" }
              stroke:  { color: "#DCC79B", width: 1 }
              effects: { cornerRadius: 9 }
          - id: logistics_db
            shape: cylinder
            geom: { w: 72, d: 72, h: 40 }
            label: "Routes"
            style:
              palette:
                top: "#FCF6E9"
                leftGradient:  { from: "#E8B96B", to: "#C18F38", dir: "down" }
                rightGradient: { from: "#F2CD8C", to: "#D6A458", dir: "down" }
              stroke: { color: "#B08234", width: 1 }
              text:   { color: "#8A6320", size: 10, weight: "700" }

      - id: dom_telemetry
        shape: group
        label: "Telemetry"
        geom: { h: 8 }
        layout: { mode: row, gap: 0.7, padding: 0.8 }
        style:
          palette: { top: "#E8F0FA", left: "#D2E0F0", right: "#DDE8F5" }
          stroke:  { color: "#C2D5EC", width: 1 }
          text:    { color: "#39598C", size: 11 }
          effects: { cornerRadius: 12 }
        parts:
          - id: telemetry_svc
            shape: rectangle
            geom: { w: 80, d: 80, h: 14 }
            icon: "iso://glyph/stream/3F6BB0"
            label: "Sensors"
            style:
              palette: { top: "#FFFFFF", left: "#D2E0F0", right: "#E4EDF8" }
              stroke:  { color: "#AFC8E6", width: 1 }
              effects: { cornerRadius: 9 }
          - id: telemetry_db
            shape: cylinder
            geom: { w: 72, d: 72, h: 40 }
            label: "Events"
            style:
              palette:
                top: "#EEF4FC"
                leftGradient:  { from: "#86A9DC", to: "#5379B5", dir: "down" }
                rightGradient: { from: "#A5C0E8", to: "#6C8FC6", dir: "down" }
              stroke: { color: "#4A6FA8", width: 1 }
              text:   { color: "#39598C", size: 10, weight: "700" }

      # ── Hero: the Data Catalog ───────────────────────────────────
      - id: catalog
        shape: rectangle
        geom: { w: 180, d: 180, h: 28 }
        icon: "iso://glyph/layers/6D5BAE"
        label: "Data Catalog"
        style:
          faces:
            top:
              fill:
                kind: radialGradient
                cx: 0.5
                cy: 0.38
                stops:
                  - { offset: 0,    color: "#FFFFFF" }
                  - { offset: 0.55, color: "#F0EBFB" }
                  - { offset: 1,    color: "#D9CEF2" }
              strokes:
                - { color: "#8E7CC3", width: 2.2 }
                - { color: "#FFFFFF", width: 0.9, opacity: 0.85 }
            left:
              fill: { kind: linearGradient, angle: 90, stops: [{offset: 0, color: "#A493D9"}, {offset: 1, color: "#7A66B8"}] }
            right:
              fill: { kind: linearGradient, angle: 90, stops: [{offset: 0, color: "#BFB2E6"}, {offset: 1, color: "#8E7CC3"}] }
          text: { color: "#4A3E78", size: 13, weight: "700" }
          effects:
            backglow:   { color: "#C9BCEC", radius: 44, opacity: 0.5 }
            dropShadow: { dx: 0, dy: 11, blur: 16, color: "rgba(122,102,184,0.25)" }

      # ── Consumers ────────────────────────────────────────────────
      - id: analytics
        shape: rectangle
        geom: { w: 100, d: 100, h: 16 }
        icon: "iso://glyph/chart/6D5BAE"
        label: "Analytics"
        style:
          palette: { top: "#FFFFFF", left: "#E0DAF0", right: "#EDE8F8" }
          stroke:  { color: "#C7BCE6", width: 1 }
          effects: { cornerRadius: 10, dropShadow: { dx: 0, dy: 5, blur: 8, color: "rgba(82,82,91,0.10)" } }

      - id: alert_sink
        shape: triprism
        geom: { w: 92, d: 92, h: 52 }
        icon: "iso://glyph/bell/A8453A"
        label: "Alerts"
        style:
          faces:
            top:   { fill: { kind: solid, color: "#FFE9E4" } }
            side0: { fill: { kind: solid, color: "#F2A294" } }
            side1: { fill: { kind: solid, color: "#E07A6C" } }
            side2: { fill: { kind: solid, color: "#CB6052" } }
          stroke: { color: "#B5503F", width: 1.1 }
          text:   { color: "#8C3A2E", size: 11, weight: "700" }

    connectors:
      - { from: dom_commerce,  to: catalog, arrow: triangle, routing: orthogonal, stroke: { color: "#479E8E", width: 1.6 } }
      - { from: dom_logistics, to: catalog, arrow: triangle, routing: orthogonal, stroke: { color: "#C18F38", width: 1.6 } }
      - { from: dom_telemetry, to: catalog, arrow: triangle, routing: orthogonal, stroke: { color: "#5379B5", width: 1.6 } }
      - { from: catalog, to: analytics,  arrow: triangle, routing: orthogonal, stroke: { color: "#8E7CC3", width: 1.6 } }
      - { from: catalog, to: alert_sink, arrow: triangle, routing: orthogonal, elbow: yFirst, label: "anomalies", labelColor: "#8C3A2E", stroke: { color: "#E07A6C", width: 1.4, dash: "3 4" } }

annotations:
  - anchor: catalog
    side: top
    distance: 50
    text: "Unified semantic layer\nlineage · contracts · access"
    bg: "#FFFFFF"
    border: "#D8D5CD"
