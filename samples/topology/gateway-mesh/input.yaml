canvas:
  background: "#F6F7FA"
  grid: iso
  gridColor: "#E7EAF2"
  padding: 30

theme:
  text: { family: "Inter, system-ui, sans-serif", color: "#1F2433" }

nodes:
  scene:
    shape: composite
    parts:
      - id: client
        shape: rectangle
        geom: { w: 110, d: 110, h: 26 }
        icon: "iso://glyph/chat"
        label: "Client"
        style: { palette: { top: "#FFFFFF", left: "#C9D1E0", right: "#DDE3EE" }, stroke: { color: "#28304A", width: 1.4 } }
      - id: gateway
        shape: hexprism
        geom: { w: 150, d: 150, h: 44 }
        icon: "iso://glyph/cloud"
        label: "API Gateway"
        place: { rightOf: client, gap: 1.4 }
        style: { palette: { top: "#EDE9FE", left: "#6D28D9", right: "#8B5CF6" }, stroke: { color: "#4C1D95", width: 1.6 } }
      - id: router
        shape: octprism
        geom: { w: 130, d: 130, h: 30 }
        icon: "iso://glyph/etl"
        label: "Route?"
        place: { rightOf: gateway, gap: 1.4 }
        style: { palette: { top: "#FEF3C7", left: "#B45309", right: "#F59E0B" }, stroke: { color: "#92400E", width: 1.5 } }
      - id: firewall
        shape: octprism
        geom: { w: 130, d: 130, h: 38 }
        icon: "iso://glyph/shield"
        label: "WAF"
        place: { behind: gateway, gap: 1.2 }
        style: { palette: { top: "#FEE2E2", left: "#B91C1C", right: "#EF4444" }, stroke: { color: "#7F1D1D", width: 1.5 } }
      - id: alert
        shape: triprism
        geom: { w: 110, d: 110, h: 34 }
        label: "Alerts"
        place: { inFrontOf: router, gap: 1.2 }
        style: { palette: { top: "#FFF7ED", left: "#C2410C", right: "#FB923C" }, stroke: { color: "#9A3412", width: 1.5 } }
    connectors:
      - { from: client, to: gateway, routing: orthogonal, arrow: triangle, stroke: { color: "#6D28D9", width: 1.8 } }
      - { from: gateway, to: router, routing: orthogonal, arrow: triangle, label: "policy", stroke: { color: "#6D28D9", width: 1.8 } }
      - { from: firewall, to: gateway, routing: orthogonal, arrow: triangle, stroke: { color: "#B91C1C", width: 1.4, dash: "5 4" } }
      - { from: router, to: alert, routing: orthogonal, arrow: triangle, stroke: { color: "#C2410C", width: 1.4, dash: "4 3" } }
