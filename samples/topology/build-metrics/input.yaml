# build-metrics — "engineering time" ghost-volume bar chart.
# Design language: pure white canvas, indigo accent. The hero tile
# (rocket glyph, gradient flanks, halo) connects to three metric
# bars; each bar is a solid gradient block PLUS a dashed wireframe
# "ghost" volume above it showing reclaimable headroom — all ghost
# tops align at one ceiling. Captions live in screen space, not on
# iso faces. The only authored numbers are sizes and the ghosts'
# vertical lift (offset.wz — z is never solved by layout).

canvas:
  background: "#FFFFFF"

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 12
    weight: "600"
    color: "#52525B"
  stroke:
    color: "#C7CAD4"
    width: 1

nodes:
  scene:
    shape: composite
    parts:
      # ── Hero tile ────────────────────────────────────────────────
      - id: hero
        shape: rectangle
        geom: { w: 170, d: 170, h: 22 }
        icon: "iso://glyph/rocket/4F46E5"
        label: "iso-topology"
        style:
          palette:
            top: "#FFFFFF"
            leftGradient:  { from: "#6366F1", to: "#312E81", dir: "down" }
            rightGradient: { from: "#818CF8", to: "#3730A3", dir: "down" }
          stroke: { color: "#4338CA", width: 1.2 }
          text:   { orient: screen, color: "#312E81", size: 14, weight: "800" }
          effects:
            cornerRadius: 14
            backglow:   { color: "#A5B4FC", radius: 40, opacity: 0.35 }
            dropShadow: { dx: 0, dy: 12, blur: 18, color: "rgba(67,56,202,0.25)" }

      # ── Bar 1: small spend, big headroom ─────────────────────────
      - id: bar_setup
        shape: rectangle
        place: { rightOf: hero, gap: 2.5 }
        geom: { w: 110, d: 110, h: 36 }
        label: "Setup & configuration"
        style: &bar
          palette:
            top: "#FFFFFF"
            leftGradient:  { from: "#6366F1", to: "#3730A3", dir: "down" }
            rightGradient: { from: "#A5B4FC", to: "#4F46E5", dir: "down" }
          stroke: { color: "#4338CA", width: 1.1 }
          text:   { orient: screen, color: "#52525B", size: 11 }
          effects:
            cornerRadius: 8
            dropShadow: { dx: 0, dy: 8, blur: 12, color: "rgba(67,56,202,0.18)" }
      - id: ghost_setup
        shape: rectangle
        place: { rightOf: hero, gap: 2.5 }
        offset: { wz: 36 }
        geom: { w: 110, d: 110, h: 114 }
        style: &ghost
          palette: { top: "none", left: "none", right: "none" }
          stroke:  { color: "#A5B4FC", width: 1.2, dash: "4 4" }

      # ── Bar 2: the big one ───────────────────────────────────────
      - id: bar_ci
        shape: rectangle
        place: { rightOf: bar_setup, gap: 1.4 }
        geom: { w: 110, d: 110, h: 120 }
        label: "CI build time"
        style: *bar
      - id: ghost_ci
        shape: rectangle
        place: { rightOf: bar_setup, gap: 1.4 }
        offset: { wz: 120 }
        geom: { w: 110, d: 110, h: 30 }
        style: *ghost

      # ── Bar 3: medium ────────────────────────────────────────────
      - id: bar_deps
        shape: rectangle
        place: { rightOf: bar_ci, gap: 1.4 }
        geom: { w: 110, d: 110, h: 64 }
        label: "Dependency upgrades"
        style: *bar
      - id: ghost_deps
        shape: rectangle
        place: { rightOf: bar_ci, gap: 1.4 }
        offset: { wz: 64 }
        geom: { w: 110, d: 110, h: 86 }
        style: *ghost

    connectors:
      - { from: hero.right-mid, to: bar_setup.left-mid, routing: orthogonal, stroke: { color: "#6366F1", width: 1.2 } }
