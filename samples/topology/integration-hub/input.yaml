# integration-hub — hub-and-spoke integrations ring.
# Design language: one hero, one accent. Clean off-white canvas, a
# white-topped hero tile with violet gradient flanks + halo, and eight
# thin white satellite tiles in a ring — every top face carries an
# icon, no on-face text anywhere. Hairline violet spokes radiate from
# the hub underneath the tiles. Zero hand-authored coordinates.

canvas:
  background: "#F5F6F8"

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 11
    weight: "600"
    color: "#3F3F46"
  stroke:
    color: "#D6D9E0"
    width: 1

nodes:
  scene:
    shape: composite
    parts:
      # ── Hub (the only hero: gradient flanks, halo, soft shadow) ──
      - id: hub
        shape: rectangle
        geom: { w: 170, d: 170, h: 24 }
        icon: "iso://glyph/bolt/7C5CFC"
        style:
          palette:
            top: "#FFFFFF"
            leftGradient:  { from: "#7C3AED", to: "#4C1D95", dir: "down" }
            rightGradient: { from: "#8B5CF6", to: "#5B21B6", dir: "down" }
          stroke: { color: "#5B21B6", width: 1.2 }
          effects:
            cornerRadius: 14
            backglow:   { color: "#A78BFA", radius: 46, opacity: 0.4 }
            dropShadow: { dx: 0, dy: 12, blur: 18, color: "rgba(91,33,182,0.28)" }

      # ── Ring of eight satellites (thin, white, icon-only) ────────
      - id: sat_n
        shape: rectangle
        place: { behind: hub, gap: 3 }
        geom: { w: 110, d: 110, h: 12 }
        icon: "iso://brand/github"
        style: &sat
          palette: { top: "#FFFFFF", left: "#E2E4EA", right: "#EEF0F4" }
          stroke:  { color: "#D6D9E0", width: 1 }
          effects:
            cornerRadius: 12
            dropShadow: { dx: 0, dy: 7, blur: 10, color: "rgba(63,63,70,0.14)" }
      - id: sat_ne
        shape: rectangle
        place: { rightOf: hub, behind: hub, gap: 1.6 }
        geom: { w: 110, d: 110, h: 12 }
        icon: "iso://brand/kafka"
        style: *sat
      - id: sat_e
        shape: rectangle
        place: { rightOf: hub, gap: 3 }
        geom: { w: 110, d: 110, h: 12 }
        icon: "iso://brand/aws"
        style: *sat
      - id: sat_se
        shape: rectangle
        place: { rightOf: hub, inFrontOf: hub, gap: 1.6 }
        geom: { w: 110, d: 110, h: 12 }
        icon: "iso://brand/docker"
        style: *sat
      - id: sat_s
        shape: rectangle
        place: { inFrontOf: hub, gap: 3 }
        geom: { w: 110, d: 110, h: 12 }
        icon: "iso://brand/postgresql"
        style: *sat
      - id: sat_sw
        shape: rectangle
        place: { leftOf: hub, inFrontOf: hub, gap: 1.6 }
        geom: { w: 110, d: 110, h: 12 }
        icon: "iso://brand/redis"
        style: *sat
      - id: sat_w
        shape: rectangle
        place: { leftOf: hub, gap: 3 }
        geom: { w: 110, d: 110, h: 12 }
        icon: "iso://brand/gcp"
        style: *sat
      - id: sat_nw
        shape: rectangle
        place: { leftOf: hub, behind: hub, gap: 1.6 }
        geom: { w: 110, d: 110, h: 12 }
        icon: "iso://brand/mongo"
        style: *sat

    connectors:
      # Hairline violet spokes, painted beneath the tiles.
      - { from: hub, to: sat_n,  stroke: { color: "#8B5CF6", width: 1.1 } }
      - { from: hub, to: sat_ne, stroke: { color: "#8B5CF6", width: 1.1, dash: "1.5 4" } }
      - { from: hub, to: sat_e,  stroke: { color: "#8B5CF6", width: 1.1 } }
      - { from: hub, to: sat_se, stroke: { color: "#8B5CF6", width: 1.1, dash: "1.5 4" } }
      - { from: hub, to: sat_s,  stroke: { color: "#8B5CF6", width: 1.1 } }
      - { from: hub, to: sat_sw, stroke: { color: "#8B5CF6", width: 1.1, dash: "1.5 4" } }
      - { from: hub, to: sat_w,  stroke: { color: "#8B5CF6", width: 1.1 } }
      - { from: hub, to: sat_nw, stroke: { color: "#8B5CF6", width: 1.1, dash: "1.5 4" } }
