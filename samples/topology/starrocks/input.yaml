# StarRocks — replica of the unified-lakehouse marketing diagram.
# Reference: https://starrocks.io
# Key visual traits per pixel-level review:
#   - very light grey background with subtle iso grid
#   - all cubes WHITE with grey side walls (E0E2E8 / F0F1F5)
#   - central StarRocks cube TALL with vivid orange-yellow top
#   - left: TWO cubes stacked iso-wise (Batch Ingestion behind,
#     Federated Analytics in front-left), each with brand glyphs
#   - front: Real-time Ingestion cube
#   - right: 4 step-stair tiles (Ad-Hoc / BI / Customer / SQL Agents)
#     climbing along the iso right axis
#   - ALL pipes use ORTHOGONAL routing so they travel along iso axes
#
# v2.2 — ZERO hand-authored coordinates. The StarRocks cube anchors the
# scene; sources, stair tiles and pedestals chain off it with `place`;
# brand tiles inside each source group are staggered with `place` and
# the substrates auto-size around them. One cell = gridStep = 40.

canvas:
  background: "#F2F4F6"
  grid: iso
  gridColor: "#E5E7EB"
  gridStep: 40

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 11
    weight: "500"
    color: "#1F2937"
  stroke:
    color: "#C4C7CF"
    width: 1

nodes:
  scene:
    shape: composite
    parts:
      # ── Central StarRocks cube (tall, yellow top w/ backglow halo) ──
      # The scene anchor: everything else is placed relative to it.
      - id: starrocks
        shape: rectangle
        geom: { w: 220, d: 220, h: 200 }
        label: "⚡\nStarRocks"
        style:
          palette:
            topGradient:   { from: "#FFE188", to: "#F59E0B", dir: "down" }
            leftGradient:  { from: "#F4F4F8", to: "#D8DAE3", dir: "down" }
            rightGradient: { from: "#FFFFFF", to: "#E8E8EE", dir: "down" }
          stroke: { color: "#D1D5DB", width: 1 }
          text: { color: "#92400E", weight: "700", size: 15 }
          effects:
            cornerRadius: 8
            backglow:   { color: "#FFC857", radius: 80, opacity: 0.55 }
            dropShadow: { dx: 0, dy: 14, blur: 22, color: "rgba(245,158,11,0.30)" }

      # ── Back-left: Batch Ingestion (behind StarRocks) ─────────────
      - id: batch_ingestion
        shape: group
        place: { leftOf: starrocks, behind: starrocks, gap: 2 }
        geom: { h: 70 }
        label: "Batch Ingestion"
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#C4C7CF", width: 1 }
          text: { color: "#1F2937", weight: "600", size: 12 }
          effects: { cornerRadius: 8 }
        parts:
          - id: bi_spark
            shape: rectangle
            geom: { w: 60, d: 60, h: 8 }
            icon: "iso://brand/spark"
            style:
              palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
              stroke: { color: "#E25A2C", width: 1 }
              effects: { cornerRadius: 8 }
          - id: bi_hadoop
            shape: rectangle
            place: { rightOf: bi_spark, inFrontOf: bi_spark, gap: 0.5 }
            geom: { w: 60, d: 60, h: 8 }
            icon: "iso://brand/hadoop"
            style:
              palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
              stroke: { color: "#65B832", width: 1 }
              effects: { cornerRadius: 8 }

      # ── Front-left: Federated Analytics (staggered brand quad) ────
      - id: federated_analytics
        shape: group
        place: { leftOf: starrocks, gap: 3.5, align: start }
        geom: { h: 80 }
        label: "Federated Analytics"
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#C4C7CF", width: 1 }
          text: { color: "#1F2937", weight: "600", size: 12 }
          effects: { cornerRadius: 8 }
        parts:
          - id: fa_mysql
            shape: rectangle
            geom: { w: 60, d: 60, h: 8 }
            icon: "iso://brand/mysql"
            style:
              palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
              stroke: { color: "#00618A", width: 1 }
              effects: { cornerRadius: 8 }
          - id: fa_pg
            shape: rectangle
            place: { rightOf: fa_mysql, inFrontOf: fa_mysql, gap: 0.5 }
            geom: { w: 60, d: 60, h: 8 }
            icon: "iso://brand/postgresql"
            style:
              palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
              stroke: { color: "#336791", width: 1 }
              effects: { cornerRadius: 8 }
          - id: fa_iceberg
            shape: rectangle
            place: { inFrontOf: fa_mysql, gap: 1.5, align: start }
            geom: { w: 60, d: 60, h: 8 }
            icon: "iso://brand/iceberg"
            style:
              palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
              stroke: { color: "#2486C0", width: 1 }
              effects: { cornerRadius: 8 }
          - id: fa_hive
            shape: rectangle
            place: { rightOf: fa_pg, inFrontOf: fa_iceberg, gap: 0.5 }
            geom: { w: 60, d: 60, h: 8 }
            icon: "iso://brand/hive"
            style:
              palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
              stroke: { color: "#D4B106", width: 1 }
              effects: { cornerRadius: 8 }

      # ── Front: Real-time Ingestion ───────────────────────────────
      - id: realtime_ingestion
        shape: group
        place: { inFrontOf: starrocks, gap: 2.5, align: start }
        geom: { h: 70 }
        label: "Real-time Ingestion And\nSynchronization"
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#C4C7CF", width: 1 }
          text: { color: "#1F2937", weight: "600", size: 12 }
          effects: { cornerRadius: 8 }
        parts:
          - id: ri_pulsar
            shape: rectangle
            geom: { w: 60, d: 60, h: 8 }
            icon: "iso://brand/pulsar"
            style:
              palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
              stroke: { color: "#D63341", width: 1 }
              effects: { cornerRadius: 8 }
          - id: ri_kafka
            shape: rectangle
            place: { rightOf: ri_pulsar, inFrontOf: ri_pulsar, gap: 0.5 }
            geom: { w: 60, d: 60, h: 8 }
            icon: "iso://brand/kafka"
            style:
              palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
              stroke: { color: "#231F20", width: 1 }
              effects: { cornerRadius: 8 }

      # ── Right step-stair: Ad-Hoc / BI / Customer / SQL Agents ────
      # Each tile is rightOf + inFrontOf its predecessor with gap 0 —
      # the corner-to-corner staircase climbing the iso right axis.
      - id: ad_hoc
        shape: rectangle
        place: { rightOf: starrocks, behind: starrocks, gap: 2.5 }
        geom: { w: 130, d: 130, h: 80 }
        label: "📈\nAd-Hoc\nAnalysis"
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#C4C7CF", width: 1 }
          text: { color: "#2563EB", weight: "700", size: 11 }
          effects: { cornerRadius: 8 }
      - id: bi_reporting
        shape: rectangle
        place: { rightOf: ad_hoc, inFrontOf: ad_hoc, gap: 0 }
        geom: { w: 130, d: 130, h: 80 }
        label: "📊\nBI\nReporting"
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#C4C7CF", width: 1 }
          text: { color: "#2563EB", weight: "700", size: 11 }
          effects: { cornerRadius: 8 }
      - id: customer_dashboards
        shape: rectangle
        place: { rightOf: bi_reporting, inFrontOf: bi_reporting, gap: 0 }
        geom: { w: 140, d: 130, h: 80 }
        label: "🎯\nCustomer-Facing\nDashboards"
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#C4C7CF", width: 1 }
          text: { color: "#2563EB", weight: "700", size: 10 }
          effects: { cornerRadius: 8 }
      - id: sql_agents
        shape: rectangle
        place: { rightOf: customer_dashboards, inFrontOf: customer_dashboards, gap: 0 }
        geom: { w: 130, d: 130, h: 80 }
        label: "🤖\nSQL\nAgents"
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#C4C7CF", width: 1 }
          text: { color: "#2563EB", weight: "700", size: 11 }
          effects: { cornerRadius: 8 }

      # ── Background decorative pedestals (small flat blocks) ──────
      - id: pedestal_back
        shape: rectangle
        place: { leftOf: batch_ingestion, behind: batch_ingestion, gap: 1.5 }
        geom: { w: 90, d: 90, h: 25 }
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#D1D5DB", width: 1 }
          effects: { cornerRadius: 8 }
      - id: pedestal_far_right
        shape: rectangle
        place: { inFrontOf: customer_dashboards, gap: 2 }
        geom: { w: 90, d: 90, h: 25 }
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#D1D5DB", width: 1 }
          effects: { cornerRadius: 8 }
      - id: pedestal_front_left
        shape: rectangle
        place: { inFrontOf: realtime_ingestion, gap: 1.5, align: start }
        geom: { w: 90, d: 90, h: 25 }
        style:
          palette: { top: "#FFFFFF", left: "#E0E2E8", right: "#F0F1F5" }
          stroke: { color: "#D1D5DB", width: 1 }
          effects: { cornerRadius: 8 }

    connectors:
      # ── Golden pipes into StarRocks (sources → centre) ───────────
      - { from: batch_ingestion,     to: starrocks, arrow: triangle, routing: orthogonal, stroke: { color: "#F7B500", width: 3.5 } }
      - { from: federated_analytics, to: starrocks, arrow: triangle, routing: orthogonal, stroke: { color: "#F7B500", width: 3.5 } }
      - { from: realtime_ingestion,  to: starrocks, arrow: triangle, routing: orthogonal, stroke: { color: "#F7B500", width: 3.5 } }
      # ── Golden pipes out of StarRocks (centre → analytics tiles) ─
      - { from: starrocks, to: ad_hoc,              arrow: triangle, routing: orthogonal, stroke: { color: "#F7B500", width: 3.5 } }
      - { from: starrocks, to: bi_reporting,        arrow: triangle, routing: orthogonal, stroke: { color: "#F7B500", width: 3.5 } }
      - { from: starrocks, to: customer_dashboards, arrow: triangle, routing: orthogonal, stroke: { color: "#F7B500", width: 3.5 } }
      - { from: starrocks, to: sql_agents,          arrow: triangle, routing: orthogonal, stroke: { color: "#F7B500", width: 3.5 } }
