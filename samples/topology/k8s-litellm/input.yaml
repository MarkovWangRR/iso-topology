# k8s-litellm — Kubernetes cluster running LiteLLM proxy pods,
# routing to external LLM providers (replica of a reference diagram).
#
# Goal: prove the v2 DSL primitives can express a 3-level nested-group
# topology with cross-group connectors and side panels.
#
# Layer cake (outer → inner):
#   KUBERNETES CLUSTER         (level 1 group)
#   ├── LiteLLM PROXY PODS     (level 2 group, inside the cluster)
#   │    ├── WORKER NODE 1     (level 3 group)
#   │    │    ├── worker icon
#   │    │    └── LiteLLM Proxy box
#   │    └── WORKER NODE 2     (level 3 group, behind WN1)
#   ├── WORKER NODE 3          (peer of LiteLLM PROXY PODS)
#   ├── WORKER NODE 4          (peer of LiteLLM PROXY PODS, holds LLM PODS)
#   └── INGRESS CONTROLLER     (small white box on the cluster floor)
#
# Outside the cluster:
#   • 3 person shapes (users) on the bottom-left
#   • 5 external LLM provider cards stacked on the right
#
# Connectors:
#   users → ingress → worker-node proxies → external provider cards.

canvas:
  background: "#F5F4F3"
  grid: iso
  gridColor: "#E6E2DC"
  gridStep: 30

theme:
  palette:
    top: "#FFFFFF"
    left: "#9CA3AF"
    right: "#B7BBC4"
  stroke:
    color: "#1F2937"
    width: 1.2
  text:
    family: "Inter, sans-serif"
    size: 11
    weight: "600"
    color: "#1F2937"

nodes:
  scene:
    shape: composite
    parts:

      # ─────────────────── KUBERNETES CLUSTER ───────────────────
      - id: cluster
        shape: group
        offset: { wx: 120, wy: 80 }
        geom: { w: 760, d: 500, h: 8 }
        label: "KUBERNETES CLUSTER"
        style:
          palette: { top: "#E9EBF6", left: "#A6ADCB", right: "#C5CADE" }
          stroke: { color: "#6E769A", width: 1 }
          effects: { cornerRadius: 26 }
          text: { color: "#3A416B", size: 13 }
        parts:

          # ─── LiteLLM PROXY PODS (level-2 group, upper-left of cluster) ───
          - id: llm_pods
            shape: group
            offset: { wx: 30, wy: 40 }
            geom: { w: 390, d: 320, h: 6 }
            label: "LiteLLM PROXY PODS"
            style:
              palette: { top: "#D9DDF1", left: "#8C95B9", right: "#B0B6D2" }
              stroke: { color: "#5E6791", width: 1 }
              effects: { cornerRadius: 18 }
              text: { color: "#3A416B", size: 12 }
            parts:

              # WORKER NODE 1 (front-left)
              - id: wn1
                shape: group
                offset: { wx: 20, wy: 150 }
                geom: { w: 340, d: 150, h: 4 }
                label: "WORKER NODE"
                style:
                  palette: { top: "#F1F4FB", left: "#A8B0CC", right: "#C3C9DE" }
                  stroke: { color: "#6E769A", width: 1 }
                  effects: { cornerRadius: 12 }
                  text: { color: "#3A416B", size: 10 }
                parts:
                  - id: wn1_worker
                    shape: rectangle
                    offset: { wx: 25, wy: 30 }
                    geom: { w: 90, d: 70, h: 36 }
                    label: ""
                    style:
                      palette: { top: "#C9E0FB", left: "#5B8FCB", right: "#8AB1DE" }
                  - id: wn1_proxy
                    shape: rectangle
                    offset: { wx: 165, wy: 35 }
                    geom: { w: 130, d: 60, h: 50 }
                    label: "LiteLLM\nProxy"
                    style:
                      palette: { top: "#4F76C9", left: "#1F3B82", right: "#2F50A0" }
                      text: { color: "#FFFFFF", size: 10 }

              # WORKER NODE 2 (back-right, behind WN1)
              - id: wn2
                shape: group
                offset: { wx: 30, wy: 20 }
                geom: { w: 340, d: 150, h: 4 }
                label: "WORKER NODE"
                style:
                  palette: { top: "#F1F4FB", left: "#A8B0CC", right: "#C3C9DE" }
                  stroke: { color: "#6E769A", width: 1 }
                  effects: { cornerRadius: 12 }
                  text: { color: "#3A416B", size: 10 }
                parts:
                  - id: wn2_worker
                    shape: rectangle
                    offset: { wx: 25, wy: 30 }
                    geom: { w: 90, d: 70, h: 36 }
                    style:
                      palette: { top: "#C9E0FB", left: "#5B8FCB", right: "#8AB1DE" }
                  - id: wn2_proxy
                    shape: rectangle
                    offset: { wx: 165, wy: 35 }
                    geom: { w: 130, d: 60, h: 50 }
                    label: "LiteLLM\nProxy"
                    style:
                      palette: { top: "#4F76C9", left: "#1F3B82", right: "#2F50A0" }
                      text: { color: "#FFFFFF", size: 10 }

          # ─── WORKER NODE 3 (peer of LiteLLM PROXY PODS, mid-right) ───
          - id: wn3
            shape: group
            offset: { wx: 460, wy: 180 }
            geom: { w: 280, d: 160, h: 4 }
            label: "WORKER NODE"
            style:
              palette: { top: "#F1F4FB", left: "#A8B0CC", right: "#C3C9DE" }
              stroke: { color: "#6E769A", width: 1 }
              effects: { cornerRadius: 12 }
              text: { color: "#3A416B", size: 10 }
            parts:
              - id: wn3_worker
                shape: rectangle
                offset: { wx: 20, wy: 35 }
                geom: { w: 90, d: 70, h: 36 }
                style:
                  palette: { top: "#C9E0FB", left: "#5B8FCB", right: "#8AB1DE" }
              - id: wn3_proxy
                shape: rectangle
                offset: { wx: 150, wy: 35 }
                geom: { w: 110, d: 60, h: 50 }
                label: "LiteLLM\nProxy"
                style:
                  palette: { top: "#4F76C9", left: "#1F3B82", right: "#2F50A0" }
                  text: { color: "#FFFFFF", size: 10 }

          # ─── WORKER NODE 4 (peer, right side, holds LLM PODS) ───
          - id: wn4
            shape: group
            offset: { wx: 460, wy: 360 }
            geom: { w: 280, d: 140, h: 4 }
            label: "WORKER NODE"
            style:
              palette: { top: "#F1F4FB", left: "#A8B0CC", right: "#C3C9DE" }
              stroke: { color: "#6E769A", width: 1 }
              effects: { cornerRadius: 12 }
              text: { color: "#3A416B", size: 10 }
            parts:
              - id: wn4_placeholder
                shape: rectangle
                offset: { wx: 20, wy: 30 }
                geom: { w: 110, d: 70, h: 20 }
                style:
                  palette: { top: "#DDE3F1", left: "#8E97B7", right: "#B2B9D1" }
              - id: wn4_llmpods
                shape: rectangle
                offset: { wx: 150, wy: 30 }
                geom: { w: 110, d: 60, h: 50 }
                label: "LLM\nPODS"
                style:
                  palette: { top: "#4F76C9", left: "#1F3B82", right: "#2F50A0" }
                  text: { color: "#FFFFFF", size: 10 }

          # ─── INGRESS CONTROLLER (bottom-left of cluster floor) ───
          - id: ingress
            shape: rectangle
            offset: { wx: 180, wy: 440 }
            geom: { w: 130, d: 50, h: 20 }
            label: "INGRESS\nCONTROLLER"
            style:
              palette: { top: "#FFFFFF", left: "#B5BBCC", right: "#D2D6E0" }
              stroke: { color: "#5E6791", width: 1.2 }
              text: { color: "#1F2937", size: 9 }

      # ─────────────────── USERS (outside, bottom-left) ───────────────────
      - id: user_1
        shape: person
        offset: { wx: 30, wy: 540 }
        geom: { w: 30, d: 30, h: 50 }
        style:
          palette: { top: "#EBC8A9", left: "#8E673E", right: "#A77F58" }
      - id: user_2
        shape: person
        offset: { wx: 70, wy: 560 }
        geom: { w: 30, d: 30, h: 50 }
        style:
          palette: { top: "#9CA3AF", left: "#4B5563", right: "#6B7280" }
      - id: user_3
        shape: person
        offset: { wx: 110, wy: 540 }
        geom: { w: 30, d: 30, h: 50 }
        style:
          palette: { top: "#7184AE", left: "#27406B", right: "#3F578A" }

      # ─────────────────── EXTERNAL LLM PROVIDERS (right column) ───────────────────
      - id: prov_openai
        shape: rectangle
        offset: { wx: 940, wy: 40 }
        geom: { w: 80, d: 80, h: 14 }
        label: "OpenAI"
        style:
          palette: { top: "#0E7F54", left: "#06432C", right: "#0A6042" }
          text: { color: "#FFFFFF", size: 10 }
      - id: prov_ai
        shape: rectangle
        offset: { wx: 940, wy: 130 }
        geom: { w: 80, d: 80, h: 14 }
        label: "Anthropic"
        style:
          palette: { top: "#D97A4E", left: "#7A3F25", right: "#9F5635" }
          text: { color: "#FFFFFF", size: 10 }
      - id: prov_cohere
        shape: rectangle
        offset: { wx: 940, wy: 220 }
        geom: { w: 80, d: 80, h: 14 }
        label: "Cohere"
        style:
          palette: { top: "#FFFFFF", left: "#B5BBCC", right: "#D2D6E0" }
          stroke: { color: "#1F2937", width: 1 }
          text: { color: "#1F2937", size: 10 }
      - id: prov_replicate
        shape: rectangle
        offset: { wx: 940, wy: 310 }
        geom: { w: 80, d: 80, h: 14 }
        label: "Replicate"
        style:
          palette: { top: "#FFFFFF", left: "#B5BBCC", right: "#D2D6E0" }
          stroke: { color: "#1F2937", width: 1 }
          text: { color: "#1F2937", size: 10 }
      - id: prov_chatgpt
        shape: rectangle
        offset: { wx: 940, wy: 400 }
        geom: { w: 80, d: 80, h: 14 }
        label: "ChatGPT"
        style:
          palette: { top: "#FFFFFF", left: "#B5BBCC", right: "#D2D6E0" }
          stroke: { color: "#1F2937", width: 1 }
          text: { color: "#1F2937", size: 10 }

    # ─────────────────── connectors ───────────────────
    connectors:
      # users → ingress
      - from: user_2
        to: ingress
        routing: orthogonal
        arrow: triangle
        stroke: { color: "#1F2937", width: 1.2 }
      # ingress → both inner proxies
      - from: ingress
        to: wn1_proxy
        routing: orthogonal
        arrow: triangle
        stroke: { color: "#1F2937", width: 1.2 }
      - from: ingress
        to: wn3_proxy
        routing: orthogonal
        arrow: triangle
        stroke: { color: "#1F2937", width: 1.2 }
      # proxies → external providers
      - from: wn1_proxy
        to: prov_openai
        routing: orthogonal
        arrow: triangle
        stroke: { color: "#1F2937", width: 1 }
      - from: wn2_proxy
        to: prov_ai
        routing: orthogonal
        arrow: triangle
        stroke: { color: "#1F2937", width: 1 }
      - from: wn3_proxy
        to: prov_cohere
        routing: orthogonal
        arrow: triangle
        stroke: { color: "#1F2937", width: 1 }
      - from: wn4_llmpods
        to: prov_chatgpt
        routing: orthogonal
        arrow: triangle
        stroke: { color: "#1F2937", width: 1 }
