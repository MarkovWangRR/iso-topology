# Multi-region — replica of a dark-mode multi-region database
# architecture diagram (green accent on near-black background,
# Region A / Region B substrates each carrying an API cloud + DB
# stack, a free-standing replication ring on the right, three
# screen-space callouts explaining the design).
#
# v2.2 — ZERO hand-authored coordinates. "Your App" anchors the scene;
# CDN sits behind it, the regions chain right/front, the replication
# ring stairs down the right flank. Region substrates auto-size around
# their API cloud + DB stack. One cell = gridStep = 40.

canvas:
  background: "#0A0A0B"
  grid: iso
  gridColor: "#1A1A1D"
  gridStep: 40

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 11
    weight: "500"
    color: "#E4E4E7"
  stroke:
    color: "#3F3F46"
    width: 1.1

nodes:
  scene:
    shape: composite
    parts:
      # ── Your App (front-left green cube — the scene anchor) ───────
      - id: app
        shape: rectangle
        geom: { w: 90, d: 90, h: 80 }
        label: "Your App"
        style:
          palette: { top: "#FFFFFF", left: "#5C8F2B", right: "#7AAE3F" }
          stroke: { color: "#0A0A0B", width: 1.3 }
          text: { color: "#1F1F2A", weight: "700", size: 11 }
          effects:
            cornerRadius: 4
            dropShadow: { dx: 0, dy: 8, blur: 12, color: "rgba(168,212,95,0.25)" }

      # ── CDN (green sphere with mesh hatch overlay) ───────────────
      - id: cdn
        shape: circle
        place: { behind: app, gap: 2.5 }
        geom: { w: 100, d: 100, h: 100 }
        label: "CDN"
        style:
          palette: { top: "#A8D45F", left: "#5C8F2B", right: "#7AAE3F" }
          stroke: { color: "#0A0A0B", width: 1.2 }
          text: { color: "#FFFFFF", weight: "700", size: 11 }
          effects:
            pattern:    { kind: "hatch", color: "#FFFFFF", spacing: 8, angle: 30 }
            dropShadow: { dx: 0, dy: 10, blur: 14, color: "rgba(168,212,95,0.3)" }

      # ── Region A substrate (auto-sized around API + DB stack) ────
      - id: region_a
        shape: group
        place: { rightOf: cdn, gap: 1.5, align: start }
        geom: { h: 14 }
        label: "Region A"
        style:
          palette: { top: "#1F1F23", left: "#0F0F12", right: "#17171B" }
          stroke: { color: "#27272A", width: 1 }
          text: { color: "#A1A1AA", weight: "500", size: 10 }
        parts:
          - id: api_a
            shape: cloud
            geom: { w: 110, d: 70, h: 24 }
            label: "API"
            style:
              palette: { top: "#FFFFFF", left: "#5C8F2B", right: "#7AAE3F" }
              stroke: { color: "#0A0A0B", width: 1.2 }
              text: { color: "#1F1F2A", weight: "700", size: 10 }
          - id: db_a
            shape: cylinder
            place: { rightOf: api_a, gap: 1.5, align: start }
            geom: { w: 90, d: 90, h: 36 }
            label: "{ }"
            style:
              palette: { top: "#FFFFFF", left: "#5C8F2B", right: "#7AAE3F" }
              stroke: { color: "#0A0A0B", width: 1.2 }
              text: { color: "#1F1F2A", weight: "700", size: 12 }
            stack: { count: 3, gap: 6 }

      # ── Region B substrate ───────────────────────────────────────
      - id: region_b
        shape: group
        place: { inFrontOf: region_a, gap: 1.25 }
        geom: { h: 14 }
        label: "Region B"
        style:
          palette: { top: "#1F1F23", left: "#0F0F12", right: "#17171B" }
          stroke: { color: "#27272A", width: 1 }
          text: { color: "#A1A1AA", weight: "500", size: 10 }
        parts:
          - id: api_b
            shape: cloud
            geom: { w: 110, d: 70, h: 24 }
            label: "API"
            style:
              palette: { top: "#FFFFFF", left: "#5C8F2B", right: "#7AAE3F" }
              stroke: { color: "#0A0A0B", width: 1.2 }
              text: { color: "#1F1F2A", weight: "700", size: 10 }
          - id: db_b
            shape: cylinder
            place: { rightOf: api_b, gap: 1.5, align: start }
            geom: { w: 90, d: 90, h: 36 }
            label: "{ }"
            style:
              palette: { top: "#FFFFFF", left: "#5C8F2B", right: "#7AAE3F" }
              stroke: { color: "#0A0A0B", width: 1.2 }
              text: { color: "#1F1F2A", weight: "700", size: 12 }
            stack: { count: 3, gap: 6 }

      # ── Replication ring (free-standing DBs stair-stepping right) ─
      - id: repl_top
        shape: cylinder
        place: { rightOf: region_a, behind: region_a, gap: 1 }
        geom: { w: 90, d: 90, h: 40 }
        label: "{ }"
        style:
          palette: { top: "#FFFFFF", left: "#5C8F2B", right: "#7AAE3F" }
          stroke: { color: "#0A0A0B", width: 1.2 }
          text: { color: "#1F1F2A", weight: "700", size: 12 }
        stack: { count: 3, gap: 6 }
      - id: repl_mid
        shape: cylinder
        place: { rightOf: repl_top, inFrontOf: repl_top, gap: 1.25 }
        geom: { w: 90, d: 90, h: 40 }
        label: "{ }"
        style:
          palette: { top: "#FFFFFF", left: "#5C8F2B", right: "#7AAE3F" }
          stroke: { color: "#0A0A0B", width: 1.2 }
          text: { color: "#1F1F2A", weight: "700", size: 12 }
        stack: { count: 3, gap: 6 }
      - id: repl_bot
        shape: cylinder
        place: { rightOf: repl_mid, inFrontOf: repl_mid, gap: 1.5 }
        geom: { w: 90, d: 90, h: 40 }
        label: "{ }"
        style:
          palette: { top: "#FFFFFF", left: "#5C8F2B", right: "#7AAE3F" }
          stroke: { color: "#0A0A0B", width: 1.2 }
          text: { color: "#1F1F2A", weight: "700", size: 12 }
        stack: { count: 3, gap: 6 }

    connectors:
      # ── Green solid flow: App → CDN → APIs → regional DBs ──────
      - { from: app,   to: cdn,      arrow: triangle, routing: orthogonal, stroke: { color: "#A8D45F", width: 1.8 } }
      - { from: cdn,   to: region_a, arrow: triangle, routing: orthogonal, stroke: { color: "#A8D45F", width: 1.8 } }
      - { from: app,   to: region_b, arrow: triangle, routing: orthogonal, stroke: { color: "#A8D45F", width: 1.8 } }
      # ── Async replication: white dashed arrows between rings ────
      - { from: region_a, to: repl_top, arrow: triangle, routing: bezier, stroke: { color: "#FFFFFF", width: 1.2, dash: "3 4" } }
      - { from: repl_top, to: repl_mid, arrow: triangle, routing: bezier, stroke: { color: "#FFFFFF", width: 1.2, dash: "3 4" } }
      - { from: repl_mid, to: repl_bot, arrow: triangle, routing: bezier, stroke: { color: "#FFFFFF", width: 1.2, dash: "3 4" } }
      - { from: region_b, to: repl_bot, arrow: triangle, routing: bezier, stroke: { color: "#FFFFFF", width: 1.2, dash: "3 4" } }

annotations:
  - anchor: cdn
    side: top
    distance: 60
    text: "Region edge cache\np95 latency <100ms"
    bg: "#1F1F23"
    border: "#3F3F46"
    color: "#E4E4E7"
    fontSize: 14
  - anchor: repl_top
    side: top
    distance: 50
    text: "Asynchronous replication\nacross regions"
    bg: "#1F1F23"
    border: "#3F3F46"
    color: "#E4E4E7"
    fontSize: 14
  - anchor: repl_bot
    side: right
    distance: 50
    text: "Multi-region architecture\n99.99% uptime SLA"
    bg: "#1F1F23"
    border: "#3F3F46"
    color: "#E4E4E7"
    fontSize: 14
