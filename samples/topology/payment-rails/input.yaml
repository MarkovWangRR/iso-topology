# payment-rails — fintech print register: a payment authorization flow
# Converted to connector-driven auto-layout (layout: {mode: auto}, v4.2).
# Every place:/offset: removed; the engine derives coordinates from the
# connector graph. All per-part styling, prism shapes, faces gradients,
# effects, icons, labels, and all connectors are preserved.

canvas:
  background: "#FFFFFF"
  padding: 64

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 14
    weight: "800"
    color: "#111114"
    orient: screen
  stroke:
    color: "#111114"
    width: 1.1
  presets:
    silver:
      palette: { top: "#F4F4F7", left: "#A6A6B0", right: "#CDCDD5" }
      stroke: { color: "#3F3F46", width: 1 }
      effects:
        cornerRadius: 10
        dropShadow: { dx: 0, dy: 9, blur: 16, color: "rgba(17,17,20,0.13)" }
    ink:
      palette:
        top: "#2C2C33"
        left: "#0B0B0E"
        right: "#1B1B21"
      stroke: { color: "#000000", width: 1 }

nodes:
  scene:
    shape: composite
    layout: { mode: auto }
    parts:
      # 1 — checkout client, silver step of the ladder
      - id: checkout
        shape: rectangle
        geom: { w: 104, d: 104, h: 30 }
        label: "Checkout"
        icon: "iso://glyph/mobile"
        preset: silver

      # 2 — THE HERO: hexprism payments gateway, the scene's single
      # emerald accent. v3.3 faces: 3-stop linear gradient on the top
      # polygon + two re-trace strokes (wide forest outline under a
      # thin mint highlight). Prism walls shade via palette by facing.
      - id: gateway
        shape: hexprism
        geom: { w: 176, d: 176, h: 64 }
        label: "Payments Gateway"
        icon: "iso://glyph/lock/light"
        style:
          palette: { left: "#04382B", right: "#0C6B4F" }
          faces:
            top:
              fill:
                kind: linearGradient
                angle: 135
                stops:
                  - { offset: 0,    color: "#A7F3D0" }
                  - { offset: 0.55, color: "#10B981" }
                  - { offset: 1,    color: "#065F46" }
              strokes:
                - { color: "#022C22", width: 1.8 }
                - { color: "#D1FAE5", width: 0.7, opacity: 0.9 }
          stroke: { color: "#022C22", width: 1.2 }

      # 3 — risk decision: v3.2 diamond prism (22.5°-rotated lozenge),
      # ink step of the ladder, tonal 2-stop gradient on the top +
      # layered strokes so the silhouette stays crisp on white.
      - id: risk
        shape: diamond
        geom: { w: 150, d: 150, h: 38 }
        label: "Risk Decision"
        icon: "iso://glyph/shield/light"
        preset: ink
        style:
          faces:
            top:
              fill:
                kind: linearGradient
                angle: 135
                stops:
                  - { offset: 0, color: "#46464F" }
                  - { offset: 1, color: "#141419" }
              strokes:
                - { color: "#000000", width: 1.6 }
                - { color: "#9A9AA6", width: 0.6, opacity: 0.85 }

      # 4 — card rails, slate step; v3.3 faces twice more: a radial
      # gradient on the top and a PROJECTED hatch pinned to the left
      # flank's iso plane (transparent tile bg over the white canvas).
      # No cornerRadius here — rounded geometry bypasses face overrides.
      - id: rails
        shape: rectangle
        geom: { w: 120, d: 120, h: 34 }
        label: "Card Rails"
        icon: "iso://glyph/globe/light"
        style:
          palette: { right: "#6E6E7A" }
          stroke: { color: "#26262D", width: 1 }
          faces:
            top:
              fill:
                kind: radialGradient
                cx: 0.3
                cy: 0.25
                stops:
                  - { offset: 0, color: "#9898A6" }
                  - { offset: 1, color: "#60606C" }
            left:
              fill:
                kind: pattern
                pattern: { kind: hatch, color: "#3A3A44", spacing: 6, angle: 0, projected: true }
          effects:
            dropShadow: { dx: 0, dy: 9, blur: 16, color: "rgba(17,17,20,0.15)" }

      # 5 — ledger of record, back to silver to close the ladder
      - id: ledger
        shape: cylinder
        geom: { w: 110, d: 110, h: 48 }
        label: "Ledger"
        icon: "iso://glyph/database"
        preset: silver

      # 6 — step-up branch off the diamond: paper-white dashed tile
      - id: review
        shape: rectangle
        geom: { w: 96, d: 96, h: 20 }
        label: "Manual Review"
        icon: "iso://glyph/user"
        style:
          palette: { top: "#FFFFFF", left: "#E4E4E9", right: "#F0F0F4" }
          stroke: { color: "#111114", width: 1.1, dash: "5 4" }
          effects: { cornerRadius: 10 }

    connectors:
      # happy path — the emerald accent spent on the flow itself
      - { from: checkout, to: gateway, routing: orthogonal, arrow: triangle, elbow: yFirst, label: "authorize", stroke: { color: "#047857", width: 1.8 } }
      - { from: gateway,  to: risk,    routing: orthogonal, arrow: triangle, elbow: yFirst, label: "tokenize",  stroke: { color: "#047857", width: 1.8 } }
      - { from: risk,     to: rails,   routing: orthogonal, arrow: triangle, elbow: yFirst, label: "approve",   stroke: { color: "#047857", width: 1.8 } }
      - { from: rails,    to: ledger,  routing: orthogonal, arrow: triangle, elbow: yFirst, label: "settle",    stroke: { color: "#047857", width: 1.8 } }
      # step-up branch — ink, dashed, async register
      - { from: risk, to: review, routing: orthogonal, arrow: triangle, label: "step-up", stroke: { color: "#111114", width: 1.4, dash: "6 4" } }

    annotations:
      - { anchor: gateway, side: top,    distance: 70, text: "PCI boundary —\ncards tokenized at the edge", border: "#111114" }
      - { anchor: risk,    side: bottom, distance: 70, text: "27-signal adaptive scoring\np99 decision · 38 ms", border: "#111114" }
      - { anchor: ledger,  side: right,  distance: 50, text: "Double-entry journal\nimmutable, append-only", border: "#111114" }
