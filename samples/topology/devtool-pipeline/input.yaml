# devtool-pipeline — CI/CD neon. A commit fans out through a triprism
# trigger into the hero build matrix (6 runner cells on a gradient-faced
# substrate), then through an octprism policy gate and a hexprism deploy
# stage onto the prod cluster. Registry replica stack rides behind the
# flow; a projected-hatch circuit panel floats behind the hero.
# One electric emerald family. Zero hand-computed coordinates.

canvas:
  background: "#0A0B0A"
  grid: iso
  gridColor: "#141A16"
  gridStep: 40
  padding: 56

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 10
    weight: "600"
    color: "#BBF7D0"
  stroke:
    color: "#2A2F2B"
    width: 1
  presets:
    edge:
      palette: { top: "#161916", left: "#0C0E0C", right: "#101310" }
      stroke:  { color: "#3A403B", width: 1 }
      text:    { color: "#D1FAE5", size: 10 }
      effects: { cornerRadius: 12 }
    runner:
      stroke: { color: "#0A0B0A", width: 0 }
      text:   { color: "#D1FAE5", size: 9 }
      faces:
        top:
          fill:
            kind: linearGradient
            angle: 135
            stops:
              - { offset: 0,    color: "#1A201B" }
              - { offset: 0.65, color: "#121712" }
              - { offset: 1,    color: "#0E120F" }
          strokes:
            - { color: "#0A0B0A", width: 1.2 }
            - { color: "#1E4D38", width: 0.7, opacity: 0.9 }
        left:  { fill: { kind: solid, color: "#0B0D0B" }, strokes: [{ color: "#0A0B0A", width: 1 }] }
        right: { fill: { kind: solid, color: "#0F120F" }, strokes: [{ color: "#0A0B0A", width: 1 }] }

nodes:
  scene:
    shape: composite
    parts:
      # ── Source (front-left anchor) ────────────────────────────────
      - id: commit
        shape: rectangle
        geom: { w: 100, d: 100, h: 16 }
        icon: "iso://si/git/34D399"
        label: "Commit"
        preset: edge

      # ── Trigger stage (triprism = fan-out) ────────────────────────
      - id: trigger
        shape: triprism
        place: { rightOf: commit, gap: 1.6 }
        geom: { w: 96, d: 96, h: 34 }
        label: "Trigger"
        style:
          text: { color: "#D1FAE5", size: 10 }
          faces:
            top:
              fill:
                kind: linearGradient
                angle: 120
                stops:
                  - { offset: 0, color: "#143D2B" }
                  - { offset: 1, color: "#0D1F16" }
              strokes:
                - { color: "#06130C", width: 1.4 }
                - { color: "#34D399", width: 0.7, opacity: 0.8 }
            "*":
              fill: { kind: solid, color: "#0C100D" }
              strokes:
                - { color: "#06130C", width: 1.2 }
                - { color: "#1E4D38", width: 0.6, opacity: 0.8 }

      # ── Circuit panel floating behind the hero (projected hatch) ──
      - id: circuit_panel
        shape: rectangle
        place: { rightOf: trigger, behind: trigger, gap: 2 }
        geom: { w: 280, d: 250, h: 6 }
        style:
          stroke: { color: "#16241C", width: 1 }
          faces:
            top:
              fill:
                kind: pattern
                pattern: { kind: hatch, color: "#1C5740", spacing: 11, angle: 45, projected: true }
            left:  { fill: { kind: solid, color: "#0B0D0B" } }
            right: { fill: { kind: solid, color: "#0D100D" } }

      # ── HERO: the build matrix (6 runners on a gradient substrate) ─
      - id: matrix
        shape: group
        place: { rightOf: trigger, inFrontOf: circuit_panel, gap: 2.2 }
        geom: { h: 22 }
        layout: { mode: grid, cols: 3, gap: 0.55 }
        style:
          palette:
            top: "#11150F"
            leftGradient:  { from: "#10B981", to: "#06231A", dir: "down" }
            rightGradient: { from: "#34D399", to: "#082A1E", dir: "down" }
          stroke: { color: "#34D399", width: 1.1 }
          effects:
            cornerRadius: 14
            backglow:   { color: "#34D399", radius: 46, opacity: 0.3 }
            dropShadow: { dx: 0, dy: 12, blur: 18, color: "rgba(52,211,153,0.22)" }
        parts:
          - { id: r_linux_x64, shape: rectangle, geom: { w: 86, d: 86, h: 10 }, icon: "iso://glyph/cpu/34D399",  label: "linux-x64",   preset: runner }
          - { id: r_linux_arm, shape: rectangle, geom: { w: 86, d: 86, h: 10 }, icon: "iso://glyph/cpu/34D399",  label: "linux-arm64", preset: runner }
          - { id: r_macos,     shape: rectangle, geom: { w: 86, d: 86, h: 10 }, icon: "iso://glyph/cpu/34D399",  label: "macos-14",    preset: runner }
          - { id: r_windows,   shape: rectangle, geom: { w: 86, d: 86, h: 10 }, icon: "iso://glyph/cpu/34D399",  label: "windows",     preset: runner }
          - { id: r_wasm,      shape: rectangle, geom: { w: 86, d: 86, h: 10 }, icon: "iso://glyph/code/34D399", label: "wasm",        preset: runner }
          - { id: r_docker,    shape: rectangle, geom: { w: 86, d: 86, h: 10 }, icon: "iso://si/docker/34D399",  label: "container",   preset: runner }

      # ── Registry stack (back-right of the matrix) ─────────────────
      - id: registry
        shape: cylinder
        place: { behind: gate, gap: 1.3 }
        geom: { w: 78, d: 78, h: 22 }
        label: "Registry"
        stack: { count: 3, gap: 5 }
        style:
          palette: { top: "#D1FAE5", left: "#065F46", right: "#10B981" }
          stroke:  { color: "#0A0B0A", width: 1.1 }
          text:    { color: "#065F46", size: 9, weight: "700" }

      # ── Policy gate (octprism) ────────────────────────────────────
      - id: gate
        shape: octprism
        place: { rightOf: matrix, gap: 1.8 }
        geom: { w: 118, d: 118, h: 40 }
        icon: "iso://glyph/shield/6EE7B7"
        label: "Policy Gate"
        style:
          text: { color: "#D1FAE5", size: 10 }
          faces:
            top:
              fill:
                kind: radialGradient
                cx: 0.5
                cy: 0.4
                stops:
                  - { offset: 0,   color: "#1B5C41" }
                  - { offset: 0.7, color: "#113A2A" }
                  - { offset: 1,   color: "#0C2118" }
              strokes:
                - { color: "#06130C", width: 1.4 }
                - { color: "#34D399", width: 0.7, opacity: 0.85 }
            "*":
              fill:
                kind: linearGradient
                angle: 90
                stops:
                  - { offset: 0, color: "#123C2B" }
                  - { offset: 1, color: "#0A140E" }
              strokes:
                - { color: "#06130C", width: 1.2 }
                - { color: "#1E4D38", width: 0.6, opacity: 0.8 }

      # ── Deploy stage (hexprism) ───────────────────────────────────
      - id: deploy
        shape: hexprism
        place: { rightOf: gate, gap: 1.7 }
        geom: { w: 126, d: 126, h: 44 }
        icon: "iso://glyph/rocket/A7F3D0"
        label: "Deploy"
        style:
          text: { color: "#ECFDF5", size: 10 }
          faces:
            top:
              fill:
                kind: linearGradient
                angle: 135
                stops:
                  - { offset: 0,    color: "#10B981" }
                  - { offset: 0.55, color: "#0B8A62" }
                  - { offset: 1,    color: "#065F46" }
              strokes:
                - { color: "#022C22", width: 1.5 }
                - { color: "#A7F3D0", width: 0.7, opacity: 0.9 }
            "*":
              fill:
                kind: linearGradient
                angle: 90
                stops:
                  - { offset: 0, color: "#0F8A60" }
                  - { offset: 1, color: "#0B2418" }
              strokes:
                - { color: "#06130C", width: 1.2 }
                - { color: "#10B981", width: 0.6, opacity: 0.7 }

      # ── Prod cluster ──────────────────────────────────────────────
      - id: prod
        shape: rectangle
        place: { rightOf: deploy, gap: 1.7 }
        geom: { w: 104, d: 104, h: 52 }
        icon: "iso://si/kubernetes/light"
        label: "Prod"
        preset: edge

    connectors:
      - { from: commit,  to: trigger, routing: orthogonal, arrow: triangle, label: "push",
          stroke: { color: "#34D399", width: 1.8 }, labelBg: "#0F1411EE", labelColor: "#A7F3D0" }
      - { from: trigger, to: matrix, routing: orthogonal, arrow: triangle, label: "fan-out ×6",
          stroke: { color: "#34D399", width: 1.8 }, labelBg: "#0F1411EE", labelColor: "#A7F3D0" }
      - { from: matrix,  to: gate, routing: orthogonal, arrow: triangle, label: "artifacts",
          stroke: { color: "#34D399", width: 1.8 }, labelBg: "#0F1411EE", labelColor: "#A7F3D0" }
      - { from: gate,    to: deploy, routing: orthogonal, arrow: triangle, label: "signed",
          stroke: { color: "#34D399", width: 1.8 }, labelBg: "#0F1411EE", labelColor: "#A7F3D0" }
      - { from: deploy,  to: prod, routing: orthogonal, arrow: triangle, label: "rollout",
          stroke: { color: "#34D399", width: 1.8 }, labelBg: "#0F1411EE", labelColor: "#A7F3D0" }
      - { from: matrix,  to: registry, routing: orthogonal, label: "oci push",
          stroke: { color: "#6EE7B7", width: 1.1, dash: "3 4" }, labelBg: "#0F1411EE", labelColor: "#6EE7B7" }
      - { from: registry, to: deploy, routing: orthogonal,
          stroke: { color: "#6EE7B7", width: 1.1, dash: "3 4" } }

annotations:
  - anchor: matrix
    side: bottom
    distance: 100
    text: "6-way build matrix\ncached, p95 3m 40s"
    bg: "#10140F"
    border: "#2A2F2B"
    color: "#D1FAE5"
    fontSize: 12
