# layout-demo — the v2.2 declarative layout primitives, end to end,
# with ZERO hand-authored coordinates. Everything below is positioned
# by `layout` (container arrangement) or `place` (sibling relations);
# the only numbers in this file are sizes.
#
#   - `workers`  : a grid-layout group — substrate auto-sizes around a
#                  2×2 arrangement of cubes
#   - `pipeline` : a row-layout group with mixed part depths, showing
#                  cross-axis center alignment
#   - `gateway`  : placed right of the workers grid
#   - `step1..3` : a stair climbing the iso right axis — each tile is
#                  rightOf + inFrontOf its predecessor
#
# Gaps are in CELLS (1 cell = canvas.gridStep = 40 world units), so
# every footprint and connector channel stays in register with the
# background grid.

canvas:
  background: "#F6F7FA"
  grid: iso
  gridColor: "#E3E7EF"
  gridStep: 40

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 11
    weight: "600"
    color: "#1F2433"

nodes:
  scene:
    shape: composite
    parts:
      - id: workers
        shape: group
        label: "Workers"
        layout: { mode: grid, cols: 2, gap: 1 }
        parts:
          - { id: w1, shape: rectangle, geom: { w: 80, d: 80, h: 60 }, label: "w1" }
          - { id: w2, shape: rectangle, geom: { w: 80, d: 80, h: 60 }, label: "w2" }
          - { id: w3, shape: rectangle, geom: { w: 80, d: 80, h: 60 }, label: "w3" }
          - { id: w4, shape: rectangle, geom: { w: 80, d: 80, h: 60 }, label: "w4" }

      - id: pipeline
        shape: group
        label: "Pipeline"
        layout: { mode: row, gap: 1 }
        place: { inFrontOf: workers, gap: 2, align: start }
        parts:
          - { id: ingest,    shape: rectangle, geom: { w: 80,  d: 80,  h: 50 }, label: "ingest" }
          - { id: transform, shape: rectangle, geom: { w: 80,  d: 120, h: 50 }, label: "transform" }
          - { id: sink,      shape: cylinder,  geom: { w: 80,  d: 80,  h: 50 }, label: "sink" }

      - id: gateway
        shape: rectangle
        geom: { w: 100, d: 100, h: 90 }
        label: "gateway"
        place: { rightOf: workers, gap: 2 }

      - id: step1
        shape: rectangle
        geom: { w: 80, d: 80, h: 50 }
        label: "s1"
        place: { rightOf: gateway, gap: 2 }
      - id: step2
        shape: rectangle
        geom: { w: 80, d: 80, h: 50 }
        label: "s2"
        place: { rightOf: step1, inFrontOf: step1, gap: 1 }
      - id: step3
        shape: rectangle
        geom: { w: 80, d: 80, h: 50 }
        label: "s3"
        place: { rightOf: step2, inFrontOf: step2, gap: 1 }

    connectors:
      - { from: workers.right-mid,  to: gateway.left-mid, arrow: triangle, routing: orthogonal, stroke: { color: "#5B7FFF", width: 2 } }
      - { from: gateway.right-mid,  to: step1.left-mid,   arrow: triangle, routing: orthogonal, stroke: { color: "#5B7FFF", width: 2 } }
      - { from: pipeline.back-mid,  to: workers.front-mid, arrow: triangle, routing: orthogonal, stroke: { color: "#9AA4B8", width: 1.5, dash: "4 3" } }
