# VITE+ — replica of the official VITE+ dev-tool board.
# Reference: vite.dev marketing illustration.
# Key visual traits per pixel-level review:
#   - white background, no grid
#   - central purple slab with HEAVY rounded corners (cornerRadius ~24)
#   - 3x3 grid of cells, ALL rounded (cornerRadius ~10):
#       inactive (test/run/format/ui/lint/lib): white top, purple
#         dashed stroke, low extrusion, soft purple shadow
#       active (dev/build): white top with bold purple text, taller
#         extrusion, solid purple stroke
#   - companion tools VITE/ROLLDOWN/OXC: same rounded card shape
#   - file extension tiles: white rounded cards, 1px black stroke
#   - hairline connectors must follow iso axes (orthogonal routing)
#
# v2.2 — ZERO hand-authored coordinates. The board is a `layout: grid`
# container (cells + wordmark as a fourth row); everything else chains
# off the board with `place` relations. One cell = 40 world units.

canvas:
  background: "#FFFFFF"

theme:
  text:
    family: "Inter, system-ui, sans-serif"
    size: 11
    weight: "500"
    color: "#1F1F2A"
  stroke:
    color: "#1F1F2A"
    width: 1.2

nodes:
  scene:
    shape: composite
    parts:
      # ── Central VITE+ board (purple slab, auto-sized 3×3 grid) ────
      - id: board
        shape: group
        geom: { h: 22 }
        layout: { mode: grid, cols: 3, gap: 0.3, padding: 0.7 }
        style:
          palette:
            topGradient:   { from: "#9F7AEA", to: "#5B21B6", dir: "down" }
            leftGradient:  { from: "#3B0F8C", to: "#5B21B6", dir: "down" }
            rightGradient: { from: "#5B21B6", to: "#3B0F8C", dir: "down" }
          stroke: { color: "#2E1065", width: 1.6 }
          text: { color: "#FFFFFF", weight: "700", size: 12 }
          effects:
            cornerRadius: 24
            backglow:   { color: "#A78BFA", radius: 24, opacity: 0.35 }
            dropShadow: { dx: 0, dy: 10, blur: 16, color: "rgba(45,10,100,0.25)" }
        parts:
          # ── Row 0: test / dev / run ──
          - id: c00
            shape: rectangle
            geom: { w: 90, d: 90, h: 4 }
            label: "test"
            style:
              palette: { top: "#FAFAFC", left: "#D8DAE3", right: "#E8EAF1" }
              stroke: { color: "#9F7AEA", width: 0.9, dash: "3 3" }
              text: { color: "#4C4C5C", weight: "500", size: 10 }
              effects: { cornerRadius: 10 }
          - id: c01_dev
            shape: rectangle
            geom: { w: 90, d: 90, h: 18 }
            label: "dev"
            style:
              palette: { top: "#FFFFFF", left: "#5B21B6", right: "#6D28D9" }
              stroke: { color: "#2E1065", width: 1.3 }
              text: { color: "#1F1F2A", weight: "700", size: 12 }
              effects:
                cornerRadius: 10
                dropShadow: { dx: 0, dy: 4, blur: 6, color: "rgba(46,16,101,0.4)" }
          - id: c02_run
            shape: rectangle
            geom: { w: 90, d: 90, h: 4 }
            label: "run"
            style:
              palette: { top: "#FAFAFC", left: "#D8DAE3", right: "#E8EAF1" }
              stroke: { color: "#9F7AEA", width: 0.9, dash: "3 3" }
              text: { color: "#4C4C5C", weight: "500", size: 10 }
              effects: { cornerRadius: 10 }

          # ── Row 1: (empty) / build / format ──
          - id: c10
            shape: rectangle
            geom: { w: 90, d: 90, h: 4 }
            label: ""
            style:
              palette: { top: "#FAFAFC", left: "#D8DAE3", right: "#E8EAF1" }
              stroke: { color: "#9F7AEA", width: 0.9, dash: "3 3" }
              effects: { cornerRadius: 10 }
          - id: c11_build
            shape: rectangle
            geom: { w: 90, d: 90, h: 18 }
            label: "build"
            style:
              palette: { top: "#FFFFFF", left: "#5B21B6", right: "#6D28D9" }
              stroke: { color: "#2E1065", width: 1.3 }
              text: { color: "#1F1F2A", weight: "700", size: 12 }
              effects:
                cornerRadius: 10
                dropShadow: { dx: 0, dy: 4, blur: 6, color: "rgba(46,16,101,0.4)" }
          - id: c12_format
            shape: rectangle
            geom: { w: 90, d: 90, h: 4 }
            label: "format"
            style:
              palette: { top: "#FAFAFC", left: "#D8DAE3", right: "#E8EAF1" }
              stroke: { color: "#9F7AEA", width: 0.9, dash: "3 3" }
              text: { color: "#4C4C5C", weight: "500", size: 10 }
              effects: { cornerRadius: 10 }

          # ── Row 2: lint / ui / lib ──
          - id: c20_lint
            shape: rectangle
            geom: { w: 90, d: 90, h: 4 }
            label: "lint"
            style:
              palette: { top: "#FAFAFC", left: "#D8DAE3", right: "#E8EAF1" }
              stroke: { color: "#9F7AEA", width: 0.9, dash: "3 3" }
              text: { color: "#4C4C5C", weight: "500", size: 10 }
              effects: { cornerRadius: 10 }
          - id: c21_ui
            shape: rectangle
            geom: { w: 90, d: 90, h: 4 }
            label: "ui"
            style:
              palette: { top: "#FAFAFC", left: "#D8DAE3", right: "#E8EAF1" }
              stroke: { color: "#9F7AEA", width: 0.9, dash: "3 3" }
              text: { color: "#4C4C5C", weight: "500", size: 10 }
              effects: { cornerRadius: 10 }
          - id: c22_lib
            shape: rectangle
            geom: { w: 90, d: 90, h: 4 }
            label: "lib"
            style:
              palette: { top: "#FAFAFC", left: "#D8DAE3", right: "#E8EAF1" }
              stroke: { color: "#9F7AEA", width: 0.9, dash: "3 3" }
              text: { color: "#4C4C5C", weight: "500", size: 10 }
              effects: { cornerRadius: 10 }

          # ── Row 3: VITE+ wordmark on the slab's front-left rim ──
          - id: vitep_logo
            shape: iso_text
            geom: { w: 90, d: 26, h: 1 }
            label: "VITE+"
            style:
              palette: { top: "#7C3AED" }
              text: { color: "#FFFFFF", weight: "700", size: 13 }

      # ── Bottom companion tools (VITE / ROLLDOWN / OXC) ────────────
      - id: vite_tile
        shape: rectangle
        place: { inFrontOf: board, gap: 2, align: start }
        geom: { w: 110, d: 100, h: 18 }
        label: "VITE"
        style:
          palette: { top: "#FFFFFF", left: "#5B21B6", right: "#6D28D9" }
          stroke: { color: "#2E1065", width: 1.4 }
          text: { color: "#1F1F2A", weight: "700", size: 12 }
          effects: { cornerRadius: 14 }
      - id: rolldown_tile
        shape: rectangle
        place: { rightOf: vite_tile, gap: 0.9 }
        geom: { w: 110, d: 100, h: 18 }
        label: "ROLLDOWN"
        style:
          palette: { top: "#FFFFFF", left: "#9A3412", right: "#C2410C" }
          stroke: { color: "#7C2D12", width: 1.4 }
          text: { color: "#1F1F2A", weight: "700", size: 11 }
          effects: { cornerRadius: 14 }
      - id: oxc_tile
        shape: rectangle
        place: { rightOf: rolldown_tile, gap: 0.9 }
        geom: { w: 110, d: 100, h: 4 }
        label: "OXC"
        style:
          palette: { top: "#FAFAFC", left: "#D8DAE3", right: "#E8EAF1" }
          stroke: { color: "#6B7280", width: 1, dash: "3 3" }
          text: { color: "#4C4C5C", weight: "500", size: 12 }
          effects: { cornerRadius: 14 }

      # ── Left-side file extensions (.TS / .VUE / .MTS / .JSON) ────
      # A staggered cascade falling down the board's left flank.
      - id: ts
        shape: rectangle
        place: { leftOf: board, gap: 4, align: start }
        geom: { w: 80, d: 70, h: 5 }
        label: ".TS"
        style:
          palette: { top: "#FFFFFF", left: "#D8DAE3", right: "#E8EAF1" }
          stroke: { color: "#1F1F2A", width: 1 }
          text: { color: "#1F1F2A", weight: "600", size: 11 }
          effects: { cornerRadius: 10 }
      - id: vue
        shape: rectangle
        place: { rightOf: ts, inFrontOf: ts, gap: 0.5 }
        geom: { w: 80, d: 70, h: 5 }
        label: ".VUE"
        style:
          palette: { top: "#FFFFFF", left: "#D8DAE3", right: "#E8EAF1" }
          stroke: { color: "#1F1F2A", width: 1 }
          text: { color: "#1F1F2A", weight: "600", size: 11 }
          effects: { cornerRadius: 10 }
      - id: mts
        shape: rectangle
        place: { leftOf: vue, inFrontOf: vue, gap: 1 }
        geom: { w: 80, d: 70, h: 5 }
        label: ".MTS"
        style:
          palette: { top: "#FFFFFF", left: "#D8DAE3", right: "#E8EAF1" }
          stroke: { color: "#1F1F2A", width: 1 }
          text: { color: "#1F1F2A", weight: "600", size: 11 }
          effects: { cornerRadius: 10 }
      - id: jsonf
        shape: rectangle
        place: { inFrontOf: mts, gap: 1.5, align: start }
        geom: { w: 80, d: 70, h: 5 }
        label: ".JSON"
        style:
          palette: { top: "#FFFFFF", left: "#D8DAE3", right: "#E8EAF1" }
          stroke: { color: "#1F1F2A", width: 1 }
          text: { color: "#1F1F2A", weight: "600", size: 11 }
          effects: { cornerRadius: 10 }

      # ── Right-side file extensions (.HTML / .JS / .CSS) ──────────
      - id: html
        shape: rectangle
        place: { rightOf: board, behind: board, gap: 1.5 }
        geom: { w: 80, d: 70, h: 5 }
        label: ".HTML"
        style:
          palette: { top: "#FFFFFF", left: "#D8DAE3", right: "#E8EAF1" }
          stroke: { color: "#1F1F2A", width: 1 }
          text: { color: "#1F1F2A", weight: "600", size: 11 }
          effects: { cornerRadius: 10 }
      - id: js
        shape: rectangle
        place: { inFrontOf: html, gap: 1, align: start }
        geom: { w: 80, d: 70, h: 5 }
        label: ".JS"
        style:
          palette: { top: "#FFFFFF", left: "#D8DAE3", right: "#E8EAF1" }
          stroke: { color: "#1F1F2A", width: 1 }
          text: { color: "#1F1F2A", weight: "600", size: 11 }
          effects: { cornerRadius: 10 }
      - id: css
        shape: rectangle
        place: { rightOf: js, inFrontOf: js, gap: 0.3 }
        geom: { w: 80, d: 70, h: 5 }
        label: ".CSS"
        style:
          palette: { top: "#FFFFFF", left: "#D8DAE3", right: "#E8EAF1" }
          stroke: { color: "#1F1F2A", width: 1 }
          text: { color: "#1F1F2A", weight: "600", size: 11 }
          effects: { cornerRadius: 10 }

    connectors:
      # All file-extension links — orthogonal so they ride the iso ground axes
      - { from: ts,    to: board, routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7 } }
      - { from: vue,   to: board, routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7 } }
      - { from: mts,   to: board, routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7 } }
      - { from: jsonf, to: board, routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7 } }
      - { from: html,  to: board, routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7 } }
      - { from: js,    to: board, routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7 } }
      - { from: css,   to: board, routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7 } }
      # Board → companion tools (dashed)
      - { from: board, to: vite_tile,     routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7, dash: "3 3" } }
      - { from: board, to: rolldown_tile, routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7, dash: "3 3" } }
      - { from: board, to: oxc_tile,      routing: orthogonal, stroke: { color: "#B8BAC7", width: 0.7, dash: "3 3" } }
