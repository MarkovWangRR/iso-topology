# ClickHouse — real-time data warehouse & database, hub-and-spoke ecosystem map.
# References the official ClickHouse architecture art: near-black stage, a glowing
# yellow-bordered ClickHouse hub in the center, five brand-logo categories around it.
canvas: { background: "#0B0B0E", grid: "", padding: 80 }

theme:
  text: { family: "Inter, system-ui, sans-serif", size: 10, weight: "600", color: "#AEB9D6" }
  presets:
    # ---- ClickHouse yellow action GLASS (Integrations / ClickPipes) ----
    chYellow:
      stroke: { color: "#FCFFB0", width: 1 }
      palette: { left: "#5E6112", right: "#9DA22A" }
      faces:
        top:   { fill: { kind: linearGradient, angle: 135, stops: [ { offset: 0.0, color: "#FCFFA8" }, { offset: 0.5, color: "#FBFF81" }, { offset: 1.0, color: "#C9CE3D" } ] } }
        left:  { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#8E9220" }, { offset: 1.0, color: "#54580F" } ] } }
        right: { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#9DA22A" }, { offset: 1.0, color: "#5E6112" } ] } }
      effects: { cornerRadius: 16, faceSplit: true, opacity: 0.86, dropShadow: { dx: 0, dy: 12, blur: 22, color: "#000000AA" } }
      text: { color: "#2A2200" }
    # ---- internal neutral feature GLASS (Dictionaries / Projections / Mat views) ----
    grey:
      stroke: { color: "#ADADB4", width: 1 }
      palette: { left: "#2E2E33", right: "#404045" }
      faces:
        top:   { fill: { kind: linearGradient, angle: 135, stops: [ { offset: 0.0, color: "#6E6E73" }, { offset: 0.55, color: "#5A5A5F" }, { offset: 1.0, color: "#45454A" } ] } }
        left:  { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#4C4C52" }, { offset: 1.0, color: "#2E2E33" } ] } }
        right: { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#404045" }, { offset: 1.0, color: "#28282C" } ] } }
      effects: { cornerRadius: 14, faceSplit: true, opacity: 0.80, dropShadow: { dx: 0, dy: 10, blur: 18, color: "#000000A0" } }
      text: { color: "#F4F4F6" }
    # ---- dark brand-logo GLASS chip (neutral charcoal) ----
    chip:
      stroke: { color: "#5C5D67", width: 1 }
      palette: { left: "#1B1C20", right: "#2C2D33" }
      faces:
        top:   { fill: { kind: linearGradient, angle: 135, stops: [ { offset: 0.0, color: "#45464C" }, { offset: 0.6, color: "#34353B" }, { offset: 1.0, color: "#25262B" } ] } }
        left:  { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#2C2D33" }, { offset: 1.0, color: "#1B1C20" } ] } }
        right: { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#232429" }, { offset: 1.0, color: "#161619" } ] } }
      effects: { cornerRadius: 12, faceSplit: true, opacity: 0.86, dropShadow: { dx: 0, dy: 8, blur: 16, color: "#00000099" } }
      text: { color: "#E6E8EC" }
    # ---- ClickHouse header GLASS (neutral near-black, yellow rim) ----
    chHead:
      stroke: { color: "#D6DC4F", width: 1.6 }
      palette: { left: "#0E0E11", right: "#18181C" }
      faces:
        top:   { fill: { kind: linearGradient, angle: 135, stops: [ { offset: 0.0, color: "#232329" }, { offset: 1.0, color: "#15161A" } ] } }
        left:  { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#18181C" }, { offset: 1.0, color: "#0E0E11" } ] } }
        right: { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#131316" }, { offset: 1.0, color: "#0B0B0D" } ] } }
      effects: { cornerRadius: 16, faceSplit: true, opacity: 0.88, dropShadow: { dx: 0, dy: 12, blur: 20, color: "#000000AA" } }
      text: { color: "#FBFF81" }
    # ---- inner GLASS sub-group (actions / feats) — no glow, neutral ----
    trayInner:
      stroke: { color: "#44454D", width: 1 }
      palette: { left: "#0F0F12", right: "#1C1C20" }
      faces:
        top:   { fill: { kind: linearGradient, angle: 135, stops: [ { offset: 0.0, color: "#232429" }, { offset: 1.0, color: "#17171B" } ] } }
        left:  { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#1C1C20" }, { offset: 1.0, color: "#0F0F12" } ] } }
        right: { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#161619" }, { offset: 1.0, color: "#0B0B0D" } ] } }
      effects: { cornerRadius: 16, faceSplit: true, opacity: 0.42, dropShadow: { dx: 0, dy: 8, blur: 16, color: "#00000088" } }
      text: { color: "#B8B9C0" }
    # ---- dark category GLASS tray (yellow rim, frosted, neutral) ----
    tray:
      stroke: { color: "#CDD24A", width: 1.2 }
      palette: { left: "#0B0B0D", right: "#161618" }
      faces:
        top:   { fill: { kind: linearGradient, angle: 135, stops: [ { offset: 0.0, color: "#1E1E22" }, { offset: 1.0, color: "#101012" } ] } }
        left:  { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#161618" }, { offset: 1.0, color: "#0B0B0D" } ] } }
        right: { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#111113" }, { offset: 1.0, color: "#08080A" } ] } }
      effects: { cornerRadius: 18, faceSplit: true, opacity: 0.62, dropShadow: { dx: 0, dy: 16, blur: 28, color: "#000000AA" }, grain: { intensity: 0.14, scale: 1.5 } }
      text: { color: "#C5CB66" }
    # ---- hero GLASS tray (the ClickHouse hub) — strong yellow glow, neutral body ----
    trayHub:
      stroke: { color: "#FBFF81", width: 1.8 }
      palette: { left: "#0E0E10", right: "#1C1C20" }
      faces:
        top:   { fill: { kind: linearGradient, angle: 135, stops: [ { offset: 0.0, color: "#26262C" }, { offset: 1.0, color: "#131316" } ] } }
        left:  { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#1C1C20" }, { offset: 1.0, color: "#0E0E10" } ] } }
        right: { fill: { kind: linearGradient, angle: 90,  stops: [ { offset: 0.0, color: "#161618" }, { offset: 1.0, color: "#0A0A0C" } ] } }
      effects: { cornerRadius: 22, faceSplit: true, opacity: 0.66, dropShadow: { dx: 0, dy: 20, blur: 32, color: "#000000BB" }, backglow: { color: "#FBFF81", radius: 72, opacity: 0.55 }, grain: { intensity: 0.12, scale: 1.6 } }
      text: { color: "#FBFF81" }

nodes:
  scene:
    shape: composite
    parts:
      # ============ Title ============
      - id: title
        offset: { wx: -294, wy: -38 }
        shape: iso_text
        geom: { w: 560, d: 26, h: 4 }
        label: "ClickHouse — Real-Time Data Warehouse & Database"
        style:
          palette: { top: "#0B0B0E" }
          text: { orient: screen, size: 23, weight: "700", color: "#FBFF81" }

      # ============ HERO: the ClickHouse hub ============
      - id: hub
        geom: { d: 460 }
        preset: trayHub
        shape: group
        label: "ClickHouse"
        parts:
          - id: chhead
            offset: { wx: 65, wy: 24 }
            preset: chHead
            shape: rectangle
            geom: { w: 360, d: 60, h: 18 }
            icon: "iso://si/clickhouse/FBFF81"
            label: "REAL-TIME DATA WAREHOUSE & DATABASE"
          - id: actions
            offset: { wx: 63, wy: 108 }
            shape: group
            preset: trayInner
            layout: { mode: row, gap: 0.7 }
            parts:
              - { id: integ, preset: chYellow, shape: rectangle, geom: { w: 140, d: 70, h: 24 }, icon: "iso://glyph/etl", label: "Integrations" }
              - { id: pipes, preset: chYellow, shape: rectangle, geom: { w: 140, d: 70, h: 24 }, icon: "iso://glyph/bolt", label: "ClickPipes" }
          - id: feats
            offset: { wx: 24, wy: 265 }
            shape: group
            preset: trayInner
            layout: { mode: row, gap: 0.7 }
            parts:
              - { id: dict, preset: grey, shape: rectangle, geom: { w: 110, d: 66, h: 22 }, icon: "iso://glyph/database/light", label: "Dictionaries" }
              - { id: proj, preset: grey, shape: rectangle, geom: { w: 110, d: 66, h: 22 }, icon: "iso://glyph/table/light",    label: "Projections" }
              - { id: matv, preset: grey, shape: rectangle, geom: { w: 110, d: 66, h: 22 }, icon: "iso://glyph/bolt/light",     label: "Materialized views" }

      # ============ Top-left: Databases & data warehouses ============
      - id: dbs
        geom: { d: 220 }
        offset: { wx: -449, wy: 207 }
        preset: tray
        shape: group
        label: "Databases & data warehouses"
        layout: { mode: grid, cols: 3, gap: 0.6 }
        parts:
          - { id: pg,    preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/postgresql/light" }
          - { id: snow,  preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/snowflake/light" }
          - { id: maria, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/mariadb/light" }
          - { id: my,    preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/mysql/light" }
          - { id: mongo, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/mongodb/light" }
          - { id: lite,  preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/sqlite/light" }

      # ============ Bottom-left: Streams, logs & analytics ============
      - id: streams
        geom: { d: 220 }
        offset: { wx: 200, wy: 765 }
        preset: tray
        shape: group
        label: "Streams, logs & analytics"
        layout: { mode: grid, cols: 3, gap: 0.6 }
        parts:
          - { id: kafka,  preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/apachekafka/light" }
          - { id: pulsar, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/apachepulsar/light" }
          - { id: spark,  preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/apachespark/light" }
          - { id: flink,  preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/apacheflink/light" }
          - { id: prom,   preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/prometheus/light" }
          - { id: sentry, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/sentry/light" }

      # ============ Top-right: Tooling & visualization ============
      - id: tooling
        geom: { d: 230 }
        offset: { wx: 166, wy: -360 }
        preset: tray
        shape: group
        label: "Tooling & visualization"
        parts:
          - { offset: { wx: 24, wy: 24 }, id: graf,  preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/grafana/light" }
          - { offset: { wx: 114, wy: 24 }, id: kib,   preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/kibana/light" }
          - { offset: { wx: 23, wy: 104 },   id: jup,   preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/jupyter/light" }
          - { offset: { wx: 114, wy: 108 }, id: bichart, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://glyph/chart/light" }

      # ============ Bottom-right: Apps & language clients ============
      - id: apps
        geom: { d: 220 }
        offset: { wx: 707, wy: -192 }
        preset: tray
        shape: group
        label: "Apps & language clients"
        layout: { mode: grid, cols: 3, gap: 0.6 }
        parts:
          - { id: py,   preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/python/light" }
          - { id: jdk,  preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/openjdk/light" }
          - { id: net,  preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/dotnet/light" }
          - { id: rust, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/rust/light" }
          - { id: golang, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/go/light" }
          - { id: node, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/nodedotjs/light" }

      # ============ Bottom-center: Data lakes & object storage ============
      - id: lakes
        geom: { d: 130 }
        offset: { wx: 464, wy: 566 }
        preset: tray
        shape: group
        label: "Data lakes & object storage"
        layout: { mode: row, gap: 0.6 }
        parts:
          - { id: dbx,   preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/databricks/light" }
          - { id: hadoop,preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/apachehadoop/light" }
          - { id: gcs,   preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/googlecloud/light" }
          - { id: minio, preset: chip, shape: rectangle, geom: { w: 66, d: 60, h: 18 }, icon: "iso://si/minio/light" }

    connectors:
      # left categories -> hub (Ingest)
      - { from: dbs,     to: hub, routing: orthogonal, arrow: triangle, stroke: { color: "#8E9220", width: 3, dash: "9 7", gradient: { from: "#8E9220", to: "#FBFF81" } }, label: "Ingest" }
      - { waypoints: [{ wx: 263, wy: 765 }, { wx: 263, wy: 590 }, { wx: 267, wy: 590 }, { wx: 267, wy: 493 }, { wx: 268, wy: 493 }],       from: streams, to: hub, routing: orthogonal, arrow: triangle, stroke: { color: "#8E9220", width: 3, dash: "9 7", gradient: { from: "#8E9220", to: "#FBFF81" } }, label: "Ingest" }
      # hub -> right categories (Query)
      - { waypoints: [{ wx: 268, wy: -122 }, { wx: 268, wy: -122 }, { wx: 268, wy: -24 }], from: tooling, to: hub, routing: orthogonal, arrow: triangle, stroke: { color: "#8E9220", width: 3, dash: "9 7", gradient: { from: "#8E9220", to: "#FBFF81" } }, label: "Query" }
      - { waypoints: [{ wx: 605, wy: -82 }, { wx: 605, wy: 154 }, { wx: 490, wy: 154 }],  from: apps,    to: hub, routing: orthogonal, arrow: triangle, stroke: { color: "#8E9220", width: 3, dash: "9 7", gradient: { from: "#8E9220", to: "#FBFF81" } }, label: "Query" }
      # data lakes <-> hub (ingest + query as external sources)
      - { waypoints: [{ wx: 606, wy: 535 }, { wx: 606, wy: 256 }, { wx: 490, wy: 256 }],  from: lakes,   to: hub, routing: orthogonal, arrow: triangle, stroke: { color: "#8E9220", width: 3, dash: "9 7", gradient: { from: "#8E9220", to: "#FBFF81" } }, label: "Ingest / external" }
