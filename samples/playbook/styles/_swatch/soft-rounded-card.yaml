canvas:
  background: '#F2F3F5'
  grid: iso
  gridColor: '#E7E9ED'
  padding: 60
theme:
  presets:
    s:
      palette:
        topGradient:
          from: '#FFFFFF'
          to: '#F1F4FB'
          dir: down
        leftGradient:
          from: '#E2E6EC'
          to: '#D2D7E0'
          dir: down
        rightGradient:
          from: '#EAEDF3'
          to: '#DBE0E8'
          dir: down
      stroke:
        color: '#D7DCE4'
        width: 1
      effects:
        cornerRadius: 20
        faceSplit: true
        dropShadow:
          dx: 0
          dy: 14
          blur: 22
          color: '#8A95A833'
nodes:
  scene:
    shape: composite
    layout:
      mode: row
      gap: 1.2
    parts:
    - id: a
      shape: rectangle
      preset: s
      geom:
        w: 90
        d: 90
        h: 34
      label: soft-rounded-card
    - id: b
      shape: rectangle
      preset: s
      geom:
        w: 80
        d: 80
        h: 80
    - id: c
      shape: cylinder
      preset: s
      geom:
        w: 80
        d: 80
        h: 44
