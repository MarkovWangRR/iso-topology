canvas:
  background: '#FFFFFF'
  grid: dots
  gridColor: '#E6E6E6'
  padding: 60
theme:
  presets:
    s:
      stroke:
        color: '#1A1A1A'
        width: 1
      effects:
        wireframe: true
        cornerRadius: 2
nodes:
  scene:
    shape: composite
    layout:
      mode: row
      gap: 1.2
    parts:
    - id: a
      shape: rectangle
      preset: s
      geom:
        w: 90
        d: 90
        h: 34
      label: wireframe-lineart
    - id: b
      shape: rectangle
      preset: s
      geom:
        w: 80
        d: 80
        h: 80
    - id: c
      shape: cylinder
      preset: s
      geom:
        w: 80
        d: 80
        h: 44
