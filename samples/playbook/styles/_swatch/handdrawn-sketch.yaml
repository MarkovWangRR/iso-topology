canvas:
  background: '#FBF8F1'
  grid: ''
  padding: 60
theme:
  presets:
    s:
      palette:
        top: '#FBFAF5'
        left: '#ECE8DD'
        right: '#E2DDCF'
      stroke:
        color: '#3A352B'
        width: 1.1
      effects:
        cornerRadius: 3
        grain:
          intensity: 0.38
          scale: 0.8
nodes:
  scene:
    shape: composite
    layout:
      mode: row
      gap: 1.2
    parts:
    - id: a
      shape: rectangle
      preset: s
      geom:
        w: 90
        d: 90
        h: 34
      label: handdrawn-sketch
    - id: b
      shape: rectangle
      preset: s
      geom:
        w: 80
        d: 80
        h: 80
    - id: c
      shape: cylinder
      preset: s
      geom:
        w: 80
        d: 80
        h: 44
