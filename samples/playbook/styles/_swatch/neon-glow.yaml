canvas:
  background: '#0B0E1A'
  grid: dots
  gridColor: '#1B2138'
  padding: 60
theme:
  presets:
    s:
      palette:
        top: '#8B7BFF'
        left: '#3B2EA8'
        right: '#5B49DD'
      stroke:
        color: '#C7BCFF'
        width: 1.5
      effects:
        cornerRadius: 5
        backglow:
          color: '#7C6BFF'
          radius: 50
          opacity: 0.5
        outline:
          color: '#C7BCFF'
          width: 1.5
          opacity: 0.8
nodes:
  scene:
    shape: composite
    layout:
      mode: row
      gap: 1.2
    parts:
    - id: a
      shape: rectangle
      preset: s
      geom:
        w: 90
        d: 90
        h: 34
      label: neon-glow
    - id: b
      shape: rectangle
      preset: s
      geom:
        w: 80
        d: 80
        h: 80
    - id: c
      shape: cylinder
      preset: s
      geom:
        w: 80
        d: 80
        h: 44
