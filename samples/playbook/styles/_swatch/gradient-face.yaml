canvas:
  background: '#F4F1EA'
  grid: ''
  padding: 60
theme:
  presets:
    s:
      palette:
        topGradient:
          from: '#FF8A4C'
          to: '#E23B3B'
          dir: down
        leftGradient:
          from: '#C42A2A'
          to: '#8E1B1B'
          dir: down
        rightGradient:
          from: '#E5402F'
          to: '#B62121'
          dir: down
      stroke:
        color: '#7E1414'
        width: 1
      effects:
        cornerRadius: 8
        faceSplit: true
nodes:
  scene:
    shape: composite
    layout:
      mode: row
      gap: 1.2
    parts:
    - id: a
      shape: rectangle
      preset: s
      geom:
        w: 90
        d: 90
        h: 34
      label: gradient-face
    - id: b
      shape: rectangle
      preset: s
      geom:
        w: 80
        d: 80
        h: 80
    - id: c
      shape: cylinder
      preset: s
      geom:
        w: 80
        d: 80
        h: 44
