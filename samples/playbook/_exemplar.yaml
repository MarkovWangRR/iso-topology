# Canonical structural diagram — pure structure + roles, NO styling.
# Every style renders this for its preview / verification. `playbook apply`
# injects the look. A generic data platform: sources → ingestion → core →
# consumption, with governance and storage.
nodes:
  scene:
    shape: composite
    parts:
      - id: core
        role: hero
        shape: rectangle
        geom: { w: 176, d: 152, h: 34 }
        icon: "iso://glyph/warehouse"
        label: "Platform"

      - id: store
        role: store
        shape: cylinder
        place: { behind: core, gap: 1.8, align: center }
        geom: { w: 116, d: 116, h: 42 }
        icon: "iso://glyph/database"
        label: "Storage"

      - id: sources
        role: group
        place: { leftOf: ingestion, gapX: 2.6, align: center }
        label: "Sources"
        layout: { mode: column, gap: 0.7, padding: 1 }
        geom: { h: 8 }
        parts:
          - { id: s1, role: source, shape: rectangle, geom: { w: 116, d: 72, h: 22 }, icon: "iso://glyph/database", label: "Database" }
          - { id: s2, role: source, shape: rectangle, geom: { w: 116, d: 72, h: 22 }, icon: "iso://glyph/cloud",    label: "Object Store" }
          - { id: s3, role: source, shape: rectangle, geom: { w: 116, d: 72, h: 22 }, icon: "iso://glyph/queue",    label: "Streaming" }

      - id: ingestion
        role: group
        place: { leftOf: core, gapX: 3, align: center }
        label: "Ingestion"
        layout: { mode: column, gap: 0.7, padding: 1 }
        geom: { h: 8 }
        parts:
          - { id: i1, role: surface, shape: rectangle, geom: { w: 116, d: 72, h: 22 }, icon: "iso://glyph/stream", label: "Pipeline" }
          - { id: i2, role: surface, shape: rectangle, geom: { w: 116, d: 72, h: 22 }, icon: "iso://glyph/bolt",   label: "Transform" }

      - id: governance
        role: group
        place: { inFrontOf: core, gap: 2.6, align: center }
        label: "Governance"
        layout: { mode: row, gap: 0.7, padding: 1 }
        geom: { h: 8 }
        parts:
          - { id: g1, role: surface, shape: rectangle, geom: { w: 104, d: 78, h: 22 }, icon: "iso://glyph/shield", label: "Catalog" }
          - { id: g2, role: surface, shape: rectangle, geom: { w: 104, d: 78, h: 22 }, icon: "iso://glyph/code",   label: "Lineage" }

      - id: consumption
        role: group
        place: { rightOf: core, gapX: 3, align: center }
        label: "Consumption"
        layout: { mode: column, gap: 0.7, padding: 1 }
        geom: { h: 8 }
        parts:
          - { id: c1, role: sink, shape: rectangle, geom: { w: 120, d: 72, h: 22 }, icon: "iso://glyph/chart", label: "BI" }
          - { id: c2, role: sink, shape: rectangle, geom: { w: 120, d: 72, h: 22 }, icon: "iso://glyph/model", label: "ML" }
          - { id: c3, role: sink, shape: rectangle, geom: { w: 120, d: 72, h: 22 }, icon: "iso://glyph/table", label: "Apps" }

    connectors:
      - { from: s2, to: i1, arrow: triangle }
      - { from: i1, to: core, arrow: triangle }
      - { from: core, to: store, arrow: triangle }
      - { from: g1, to: core, arrow: triangle }
      - { from: core, to: c1, arrow: triangle }
