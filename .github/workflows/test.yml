name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: go build ./...
      - name: Test
        # Runs the golden suite plus the dedicated gates:
        #   TestLICENSEIsCanonicalApache  (#4)
        #   TestSamplesTextContrast       (#5 — contrast-clean samples)
        #   TestBadCaseIntake             (#12 — intake scaffolding present)
        run: go test ./...
