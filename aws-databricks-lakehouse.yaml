# Style base: samples/style_refer/lakehouse-ember (Databricks clone — white/slate
# soft-rounded cards on a pale iso grid, faceSplit + soft slate dropShadow, one
# ember red-orange hero accent = Databricks #FF3621, dashed white trays).
# Theme: AWS Databricks Lakehouse — a typical end-to-end data pipeline.
canvas: { background: "#F6F7F9", grid: iso, gridColor: "#E8EBEF", gridStep: 40, padding: 64, aspectRatio: 1.5 }

theme:
  text: { family: "Inter, system-ui, sans-serif", size: 11, weight: "600", color: "#1B3139" }
  presets:
    # ---- white soft-rounded card (regular AWS / Databricks service) ----
    card:
      palette:
        topGradient:   { from: "#FFFFFF", to: "#F1F4F8", dir: down }
        leftGradient:  { from: "#E3E8ED", to: "#D3DAE1", dir: down }
        rightGradient: { from: "#ECEFF3", to: "#DBE1E8", dir: down }
      stroke: { color: "#D3DAE0", width: 1 }
      text: { color: "#1B3139" }
      effects: { cornerRadius: 16, faceSplit: true, dropShadow: { dx: 0, dy: 12, blur: 20, color: "#1B313922" } }
    # ---- cool slate card (rhythm / secondary tier) ----
    slate:
      palette:
        topGradient:   { from: "#EEF2F7", to: "#DCE3EB", dir: down }
        leftGradient:  { from: "#C2CDD9", to: "#AEBCCB", dir: down }
        rightGradient: { from: "#D2DBE5", to: "#BDC9D6", dir: down }
      stroke: { color: "#AEBCCB", width: 1 }
      text: { color: "#1B3139" }
      effects: { cornerRadius: 16, faceSplit: true, dropShadow: { dx: 0, dy: 12, blur: 20, color: "#1B313922" } }
    # ---- flat slate for the cloud shape (it ignores gradients) ----
    cloudFlat:
      palette: { top: "#EAEFF5", left: "#AEBCCB", right: "#C7D1DC" }
      stroke: { color: "#AEBCCB", width: 1 }
      text: { color: "#1B3139" }
    # ---- flat slate for cylinders (they ignore gradients + faceSplit) ----
    cylSlate:
      palette: { top: "#E4EAF1", left: "#AEBCCB", right: "#C7D1DC" }
      stroke: { color: "#AEBCCB", width: 1 }
      text: { color: "#1B3139" }
    # ---- ember hero — Databricks red-orange (the one loud node) ----
    ember:
      palette:
        topGradient:   { from: "#FF5A3C", to: "#FF3621", dir: down }
        leftGradient:  { from: "#B6230F", to: "#8E1808", dir: down }
        rightGradient: { from: "#DC2C16", to: "#AE1C0B", dir: down }
      stroke: { color: "#8E1808", width: 1 }
      text: { color: "#FFFFFF" }
      effects: { cornerRadius: 18, faceSplit: true, backglow: { color: "#FF3621", radius: 56, opacity: 0.4 }, dropShadow: { dx: 0, dy: 16, blur: 26, color: "#8E180833" } }
    # ---- soft-rounded dashed white tray (flat light sides, thin slab) ----
    tray:
      palette: { top: "#EFF2F6", left: "#E3E8ED", right: "#ECEFF3" }
      stroke: { color: "#D3DAE0", width: 1.1, dash: "4 3" }
      text: { color: "#5A6B73", size: 12, weight: "700" }
      effects: { cornerRadius: 14 }
    # ---- ember-tinted hero tray (the Lakehouse zone) ----
    trayEmber:
      palette: { top: "#FFF3F0", left: "#F3D5CD", right: "#F8E2DC" }
      stroke: { color: "#F0A18F", width: 1.2, dash: "4 3" }
      text: { color: "#8E1808", size: 12, weight: "700" }
      effects: { cornerRadius: 14 }

nodes:
  scene:
    shape: composite
    parts:
      # ============ Title ============
      - id: title
        offset: { wx: -766, wy: -114 }
        shape: iso_text
        geom: { w: 560, d: 26, h: 4 }
        label: "AWS Databricks Lakehouse — Typical Data Pipeline"
        style:
          text: { orient: screen, size: 19, weight: "700", color: "#1B3139" }

      # ============ HERO: Databricks Lakehouse (Delta on S3, medallion) ============
      - id: lakehouse
        offset: { wx: 2, wy: -35 }
        preset: trayEmber
        shape: group
        geom: { h: 8 }
        label: "Databricks Lakehouse · Delta Lake"
        layout: { mode: column, gap: 0.6 }
        parts:
          - { id: bronze, preset: slate, shape: rectangle, geom: { w: 168, d: 76, h: 30 }, icon: "iso://glyph/database", label: "Bronze · Raw" }
          - { id: silver, preset: card,  shape: rectangle, geom: { w: 168, d: 76, h: 30 }, icon: "iso://glyph/table",    label: "Silver · Cleansed" }
          - { id: gold,   preset: ember, shape: rectangle, geom: { w: 168, d: 76, h: 36 }, icon: "iso://glyph/sparkles/light", label: "Gold · Curated" }

      # ============ Ingestion (left of hero) ============
      - id: ingest
        offset: { wx: -296, wy: -51 }
        preset: tray
        shape: group
        geom: { h: 8 }
        label: "Ingestion"
        layout: { mode: column, gap: 0.8 }
        parts:
          - { id: autoloader, preset: card, shape: rectangle, geom: { w: 142, d: 74, h: 26 }, icon: "iso://glyph/etl",    label: "Auto Loader · DMS" }
          - { id: s3,         preset: cylSlate, shape: cylinder,  geom: { w: 100, d: 100, h: 42 }, icon: "iso://glyph/database", label: "Amazon S3 · Landing" }

      # ============ Sources (far left) ============
      - id: sources
        offset: { wx: -560, wy: -126 }
        preset: tray
        shape: group
        geom: { h: 8 }
        label: "Data Sources"
        layout: { mode: column, gap: 0.8 }
        parts:
          - { id: rds,     preset: cylSlate, shape: cylinder,  geom: { w: 96, d: 96, h: 40 }, icon: "iso://glyph/database", label: "Aurora · RDS" }
          - { id: saas,    preset: cloudFlat, shape: cloud,     geom: { w: 124, d: 86, h: 46 }, icon: "iso://glyph/cloud",   label: "SaaS Apps" }
          - { id: kinesis, preset: card,      shape: rectangle, geom: { w: 128, d: 70, h: 24 }, icon: "iso://glyph/stream",  label: "Kinesis · Kafka" }

      # ============ Consumption (below hero) ============
      - id: consume
        offset: { wx: 309, wy: 78 }
        preset: tray
        shape: group
        geom: { h: 8 }
        label: "Consumption"
        layout: { mode: row, gap: 0.8 }
        parts:
          - { id: dbsql, preset: card, shape: rectangle, geom: { w: 130, d: 80, h: 26 }, icon: "iso://glyph/chart",     label: "Databricks SQL · BI" }
          - { id: mlflow, preset: card, shape: rectangle, geom: { w: 130, d: 80, h: 26 }, icon: "iso://si/mlflow",       label: "MLflow · Serving" }

      # ============ Compute (below ingestion) ============
      - id: compute
        offset: { wx: -42, wy: 392 }
        preset: tray
        shape: group
        geom: { h: 8 }
        label: "Compute"
        layout: { mode: column, gap: 0.8 }
        parts:
          - { id: dlt,   preset: slate, shape: rectangle, geom: { w: 150, d: 86, h: 30 }, icon: "iso://si/databricks",  label: "Delta Live Tables" }
          - { id: spark, preset: slate, shape: rectangle, geom: { w: 150, d: 86, h: 30 }, icon: "iso://si/apachespark", label: "Spark Clusters" }

      # ============ Governance (below sources) ============
      - id: govern
        offset: { wx: 7, wy: -357 }
        preset: tray
        shape: group
        geom: { h: 8 }
        label: "Governance"
        layout: { mode: column, gap: 0.8 }
        parts:
          - { id: unity, preset: card, shape: rectangle, geom: { w: 134, d: 70, h: 24 }, icon: "iso://glyph/shield", label: "Unity Catalog" }
          - { id: iam,   preset: card, shape: rectangle, geom: { w: 134, d: 70, h: 24 }, icon: "iso://glyph/lock",   label: "IAM · KMS" }

    connectors:
      - { waypoints: [{ wx: -296, wy: 64 }, { wx: -296, wy: 84 }],  from: sources, to: ingest, routing: orthogonal, arrow: triangle, stroke: { color: "#8A99A6", width: 1.4 } }
      - { waypoints: [{ wx: 2, wy: 84 }, { wx: 2, wy: 127 }],  from: ingest, to: lakehouse, routing: orthogonal, arrow: triangle, stroke: { color: "#8A99A6", width: 1.4 } }
      - { waypoints: [{ wx: 65, wy: 289 }, { wx: 110, wy: 289 }],  from: compute, to: lakehouse, routing: orthogonal, arrow: triangle, stroke: { color: "#FF5A3C", width: 1.5 } }
      - { waypoints: [{ wx: 309, wy: 127 }, { wx: 309, wy: 150 }],  from: lakehouse, to: consume, routing: orthogonal, arrow: triangle, stroke: { color: "#FF5A3C", width: 1.5 } }
      - { waypoints: [{ wx: 106, wy: -35 }, { wx: 110, wy: -35 }],  from: govern, to: lakehouse, routing: orthogonal, arrow: none, stroke: { color: "#A6B2BD", width: 1.1, dash: "dashed" } }
