<!doctype html><html><head><meta charset="utf-8"><style>
body{margin:0;padding:32px;background:#FAFAFB;font-family:Inter,'Helvetica Neue',Arial,sans-serif;color:#1F2937;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(127,127,127,0.18);border-radius:10px;padding:12px;display:flex;flex-direction:column;}
.card h3{margin:0 0 6px;font:11px ui-monospace,Menlo,monospace;opacity:0.65;}
.stage{flex:1;display:flex;align-items:center;justify-content:center;min-height:160px;}
.stage img{max-width:100%;max-height:180px;}
</style></head><body><div class="grid">
<div class="card"><h3>scene</h3><div class="stage"><img src="./scene.svg" alt="scene"/></div></div>
</div></body></html>
